<!doctype html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenClaw Guia Didatico | Command Deck</title>
  <style>
    :root {
      --bg: #090e17;
      --panel: #0f1623;
      --panel-2: #131d2d;
      --panel-3: #182438;
      --ink: #eef5ff;
      --muted: #97a6ba;
      --line: #263449;
      --line-strong: #3d506d;
      --blue: #74a9ff;
      --green: #4ade80;
      --amber: #f7c948;
      --rose: #fb7185;
      --cyan: #22d3ee;
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.26);
      --radius: 8px;
      color-scheme: dark;
    }

    :root[data-theme="light"] {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --panel-2: #f1f5fb;
      --panel-3: #e9eef7;
      --ink: #101828;
      --muted: #5f6f84;
      --line: #d8e1ee;
      --line-strong: #bdc9da;
      --blue: #2563eb;
      --green: #15803d;
      --amber: #a16207;
      --rose: #be123c;
      --cyan: #0891b2;
      --shadow: 0 20px 48px rgba(16, 24, 40, 0.12);
      color-scheme: light;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 0%, rgba(116, 169, 255, 0.14), transparent 36vw),
        radial-gradient(circle at 88% 10%, rgba(74, 222, 128, 0.08), transparent 32vw),
        radial-gradient(circle at 50% 100%, rgba(251, 113, 133, 0.06), transparent 38vw),
        var(--bg);
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    a {
      color: var(--blue);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .deck {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr) 330px;
      gap: 16px;
      padding: 16px;
    }

    .rail,
    .stage,
    .mission-aside,
    .top-strip,
    .mini-card,
    .command-card,
    .check-item,
    .provider-card {
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--panel) 94%, transparent);
      backdrop-filter: blur(20px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .rail {
      position: sticky;
      top: 16px;
      height: calc(100vh - 32px);
      display: grid;
      grid-template-rows: auto auto auto minmax(0, 1fr) auto;
      gap: 14px;
      padding: 16px;
      overflow: hidden;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--ink);
      text-decoration: none;
      border-radius: var(--radius);
    }

    .brand:hover {
      text-decoration: none;
    }

    .brand:focus-visible {
      outline: 2px solid var(--blue);
      outline-offset: 4px;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--panel-2);
      border: 1px solid var(--line);
      overflow: hidden;
      padding: 4px;
    }

    .brand-mark img,
    .brand-mark svg {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }

    .brand strong,
    .stage-title strong {
      display: block;
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    .brand span,
    .stage-title span {
      color: var(--muted);
      font-size: 12px;
      display: block;
      margin-top: 4px;
    }

    .progress-orb {
      display: grid;
      grid-template-columns: 86px minmax(0, 1fr);
      align-items: center;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-2);
    }

    .orb {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: conic-gradient(var(--green) 0deg, var(--line) 0deg);
      position: relative;
    }

    .orb::after {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: inherit;
      background: var(--panel);
    }

    .orb span {
      position: relative;
      z-index: 1;
      font-weight: 850;
      font-size: 18px;
    }

    .progress-copy p {
      margin: 4px 0 0;
      color: var(--muted);
      line-height: 1.35;
      font-size: 12px;
    }

    .rail-tools {
      display: grid;
      gap: 8px;
    }

    .rail-box {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-2);
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .rail-box-label {
      color: var(--blue);
      font-size: 11px;
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .rail-search {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      background: var(--panel);
      color: var(--ink);
      outline: none;
    }

    .rail-search:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--blue) 18%, transparent);
    }

    .glossary-toggle {
      width: 100%;
      justify-content: space-between;
      padding: 0 12px;
    }

    .glossary-toggle.active {
      border-color: var(--blue);
      background: color-mix(in srgb, var(--blue) 16%, var(--panel-2));
    }

    .glossary-toggle span {
      opacity: 0.8;
    }

    .glossary-stage {
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .glossary-hero {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--blue) 12%, transparent), transparent 48%),
        var(--panel-2);
      padding: 18px;
    }

    .glossary-hero h1 {
      font-size: clamp(34px, 5vw, 56px);
      line-height: 1;
      margin-bottom: 10px;
    }

    .letter-index {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(36px, 1fr));
      gap: 6px;
    }

    .letter-link {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--panel-2);
      color: var(--ink);
      font-size: 12px;
      font-weight: 850;
      text-decoration: none;
    }

    .letter-link.disabled {
      opacity: 0.35;
      pointer-events: none;
    }

    .glossary-sections {
      display: grid;
      gap: 14px;
    }

    .glossary-section {
      display: grid;
      gap: 10px;
    }

    .letter-heading {
      color: var(--blue);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .glossary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .glossary-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      padding: 12px;
      display: grid;
      gap: 6px;
    }

    .glossary-card strong {
      font-size: 13px;
      color: var(--ink);
    }

    .glossary-card p {
      margin: 0;
      font-size: 12px;
      line-height: 1.45;
    }

    .stage-list {
      display: grid;
      gap: 8px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .stage-button {
      width: 100%;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      color: var(--muted);
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr) 22px;
      align-items: center;
      gap: 10px;
      padding: 9px;
      text-align: left;
    }

    .stage-button:hover {
      background: var(--panel-2);
      color: var(--ink);
    }

    .stage-button.active {
      border-color: var(--line-strong);
      background: linear-gradient(135deg, color-mix(in srgb, var(--blue) 9%, var(--panel)), var(--panel-2));
      color: var(--ink);
    }

    .stage-button.done .stage-no {
      background: color-mix(in srgb, var(--green) 18%, var(--panel));
      color: var(--green);
    }

    .stage-no {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--panel-3);
      color: var(--blue);
      font-size: 12px;
      font-weight: 820;
    }

    .stage-button strong {
      font-size: 13px;
      line-height: 1.2;
      display: block;
    }

    .stage-button small {
      color: var(--muted);
      font-size: 11px;
    }

    .stage-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid var(--line-strong);
      justify-self: center;
    }

    .stage-button.done .stage-dot {
      background: var(--green);
      border-color: var(--green);
    }

    .rail-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .deck-button,
    .copy-button,
    .mode-button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-2);
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 720;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
    }

    .deck-button:hover,
    .copy-button:hover,
    .mode-button:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
      background: var(--panel-3);
    }

    .theme-icon-button {
      width: 44px;
      min-width: 44px;
      padding: 0;
    }

    .theme-icon {
      width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .theme-icon svg {
      width: 18px;
      height: 18px;
      display: block;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2.2;
    }

    .deck-button.primary {
      background: linear-gradient(135deg, var(--blue), var(--green));
      color: #06111f;
      border-color: transparent;
    }

    .workbench {
      min-width: 0;
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .top-strip {
      min-height: 84px;
      padding: 14px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 12px;
      align-items: center;
      box-shadow: none;
    }

    .stage-title {
      min-width: 0;
    }

    .stage-title strong {
      font-size: clamp(20px, 3vw, 32px);
    }

    .stage-title span {
      line-height: 1.45;
      max-width: 760px;
    }

    .stage {
      padding: 18px;
      min-height: 620px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 16px;
      overflow: hidden;
    }

    .stage-hero {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(240px, 0.9fr);
      gap: 14px;
    }

    .feature-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--blue) 12%, transparent), transparent 48%),
        var(--panel-2);
      padding: 18px;
      min-height: 180px;
      display: grid;
      align-content: end;
    }

    .feature-card .kicker,
    .mini-label,
    .card-kicker {
      color: var(--blue);
      font-size: 11px;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 12px;
      font-size: clamp(34px, 5.4vw, 64px);
      line-height: 1;
      max-width: 900px;
    }

    .feature-card h1 {
      max-width: 100%;
      overflow-wrap: break-word;
      text-wrap: balance;
    }

    .feature-card h1.long-title {
      font-size: 50px;
      line-height: 1.03;
    }

    .feature-card h1.step-title {
      font-size: clamp(34px, 4vw, 50px);
      line-height: 1.04;
      white-space: normal;
      overflow-wrap: anywhere;
    }

    h2 {
      font-size: clamp(24px, 4vw, 42px);
      line-height: 1.05;
      margin-bottom: 10px;
    }

    h3 {
      font-size: 16px;
      margin-bottom: 10px;
    }

    p {
      color: var(--muted);
      line-height: 1.58;
    }

    .stage-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .mini-card {
      box-shadow: none;
      padding: 14px;
      background: var(--panel-2);
    }

    .mini-card strong {
      display: block;
      margin-top: 8px;
      font-size: 20px;
    }

    .stage-content {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 0.8fr);
      gap: 14px;
      min-height: 0;
    }

    .stage-content.provider-stage-content {
      grid-template-columns: minmax(0, 1fr);
    }

    .stage-content.provider-stage-content > .content-column:nth-child(2) {
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }

    .content-column {
      display: grid;
      gap: 12px;
      align-content: start;
      min-width: 0;
    }

    .command-card {
      box-shadow: none;
      overflow: visible;
      background: #050914;
      position: relative;
    }

    :root[data-theme="light"] .command-card {
      background: #111827;
    }

    .command-head {
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 10px 0 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      color: #dce7f7;
      font-size: 12px;
    }

    .command-title {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 7px;
      font-weight: 850;
    }

    .command-title > span:first-child {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .command-help {
      position: relative;
      flex: 0 0 auto;
      width: 18px;
      height: 18px;
      border: 1px solid rgba(147, 197, 253, 0.55);
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      color: #93c5fd;
      background: rgba(147, 197, 253, 0.08);
      cursor: help;
    }

    .command-help svg {
      width: 11px;
      height: 11px;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2.4;
    }

    .command-help::after {
      content: attr(data-tip);
      position: absolute;
      left: auto;
      right: 0;
      top: calc(100% + 9px);
      z-index: 40;
      width: min(310px, 72vw);
      padding: 10px 11px;
      border: 1px solid rgba(147, 197, 253, 0.55);
      border-radius: 8px;
      background: #e9f0fb;
      color: #06111f;
      font-size: 12px;
      line-height: 1.38;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 700;
      white-space: normal;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-4px);
      transition: opacity 120ms ease, transform 120ms ease;
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.28);
    }

    .command-help:hover::after,
    .command-help:focus-visible::after {
      opacity: 1;
      transform: translateY(0);
    }

    .command-help::after,
    .cell-help::after {
      display: none;
    }

    .copy-button {
      min-height: 30px;
      padding: 0 10px;
      color: white;
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.18);
      font-size: 12px;
    }

    pre {
      margin: 0;
      padding: 15px;
      color: #e9f0fb;
      overflow-x: auto;
      line-height: 1.55;
      font-size: 13px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    code {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 0.95em;
    }

    .inline-code {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--ink);
      border-radius: 6px;
      padding: 1px 5px;
      font-size: 0.92em;
    }

    .check-grid {
      display: grid;
      gap: 8px;
    }

    .check-item {
      box-shadow: none;
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      padding: 11px 12px;
      background: var(--panel-2);
    }

    .check-item input {
      appearance: none;
      width: 20px;
      height: 20px;
      border: 1.5px solid var(--line-strong);
      border-radius: 6px;
      margin: 0;
      background: var(--panel);
      display: grid;
      place-items: center;
    }

    .check-item input:checked {
      background: var(--green);
      border-color: var(--green);
    }

    .check-item input:checked::after {
      content: "";
      width: 9px;
      height: 5px;
      border-left: 2px solid #06111f;
      border-bottom: 2px solid #06111f;
      transform: rotate(-45deg);
      margin-top: -2px;
    }

    .check-item label {
      line-height: 1.42;
      cursor: pointer;
    }

    .check-item:has(input:checked) {
      border-color: color-mix(in srgb, var(--green) 50%, var(--line));
      background: color-mix(in srgb, var(--green) 10%, var(--panel));
    }

    .note-card {
      border: 1px solid var(--line);
      border-left: 3px solid var(--amber);
      border-radius: var(--radius);
      padding: 13px 14px;
      background: color-mix(in srgb, var(--amber) 8%, var(--panel));
      color: var(--ink);
      line-height: 1.5;
    }

    .fallback-panel {
      border: 1px solid color-mix(in srgb, var(--blue) 34%, var(--line));
      border-radius: var(--radius);
      padding: 16px;
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--blue) 7%, transparent), transparent 70%),
        var(--panel);
      display: grid;
      gap: 14px;
    }

    .fallback-head {
      display: grid;
      gap: 6px;
      max-width: 760px;
    }

    .fallback-head strong {
      font-size: clamp(20px, 1.8vw, 30px);
      line-height: 1.08;
    }

    .fallback-head p {
      margin: 0;
      color: var(--muted);
      line-height: 1.48;
    }

    .fallback-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .fallback-grid .command-card:first-child,
    .fallback-grid .command-card:last-child {
      grid-column: 1 / -1;
    }

    .provider-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .provider-card {
      box-shadow: none;
      padding: 14px;
      background: var(--panel-2);
      display: grid;
      gap: 10px;
      align-content: start;
      transition: border-color 140ms ease, background 140ms ease;
    }

    .provider-card.active {
      border-color: color-mix(in srgb, var(--blue) 50%, var(--line));
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--blue) 8%, transparent), transparent 52%),
        var(--panel-2);
    }

    .provider-choice {
      min-height: 32px;
      justify-content: center;
      font-size: 12px;
      font-weight: 850;
    }

    .provider-choice.active {
      color: #06111f;
      border-color: transparent;
      background: linear-gradient(135deg, var(--blue), var(--green));
    }

    .provider-hint {
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      padding: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      background: color-mix(in srgb, var(--panel) 70%, transparent);
    }

    .provider-card strong {
      font-size: 15px;
    }

    .provider-card p {
      margin: 0;
      font-size: 13px;
    }

    .link-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-2);
      padding: 14px;
      display: grid;
      gap: 8px;
      text-decoration: none;
      color: var(--ink);
    }

    .link-card:hover {
      border-color: var(--line-strong);
      background: var(--panel-3);
      text-decoration: none;
    }

    .link-card strong {
      font-size: 15px;
    }

    .link-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .link-card .link-body {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .link-card .link-cta {
      color: #06111f;
      background: linear-gradient(135deg, var(--blue), var(--green));
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.04em;
      white-space: nowrap;

      border-collapse: collapse;
      table-layout: fixed;
      overflow: visible;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      font-size: clamp(14px, 0.82vw, 15.5px);
    }

    .simple-table th,
    .simple-table td {
      padding: 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    .simple-table th {
      color: var(--blue);
      background: var(--panel-2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: clamp(11px, 0.68vw, 12px);
    }

    .simple-table tr:last-child td {
      border-bottom: 0;
    }

    .table-cell {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      max-width: 100%;
    }

    .table-cell code {
      font-size: 1em;
      min-width: 0;
      white-space: normal;
      overflow-wrap: anywhere;
    }

    .table-link {
      color: var(--blue);
      text-decoration: underline;
      text-underline-offset: 3px;
      font-weight: 850;
    }

    .table-link:hover {
      color: var(--green);
    }

    .cell-help {
      position: relative;
      flex: 0 0 auto;
      width: 17px;
      height: 17px;
      border: 1px solid var(--line-strong);
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      color: var(--blue);
      background: var(--panel-2);
      cursor: help;
      transform: translateY(1px);
    }

    .cell-help svg {
      width: 11px;
      height: 11px;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2.4;
    }

    .cell-help::after {
      content: attr(data-tip);
      position: absolute;
      left: 0;
      bottom: calc(100% + 9px);
      z-index: 20;
      width: min(270px, 72vw);
      padding: 9px 10px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: var(--ink);
      color: var(--bg);
      font-size: 12px;
      line-height: 1.35;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 650;
      text-transform: none;
      letter-spacing: 0;
      white-space: normal;
      opacity: 0;
      pointer-events: none;
      transform: translateY(4px);
      transition: opacity 120ms ease, transform 120ms ease;
    }

    .cell-help.tip-left::after {
      left: auto;
      right: 0;
    }

    .cell-help:hover::after,
    .cell-help:focus-visible::after {
      opacity: 1;
      transform: translateY(0);
    }

    .stage-footer {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .mission-aside {
      position: sticky;
      top: 16px;
      height: calc(100vh - 32px);
      padding: 16px;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 14px;
      overflow: hidden;
    }

    .aside-block {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-2);
      padding: 14px;
    }

    .mission-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .mission-reset {
      width: 28px;
      min-width: 28px;
      min-height: 28px;
      padding: 0;
      border-radius: 7px;
      opacity: 0.52;
      background: transparent;
    }

    .mission-reset:hover,
    .mission-reset:focus-visible {
      opacity: 1;
      background: var(--panel);
    }

    .mission-reset svg {
      width: 15px;
      height: 15px;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2.2;
    }

    .aside-block h3 {
      margin-bottom: 8px;
    }

    .phase-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .phase-cell {
      min-height: 44px;
      border-radius: 8px;
      background: var(--panel);
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .phase-cell.done {
      background: color-mix(in srgb, var(--green) 16%, var(--panel));
      color: var(--green);
      border-color: color-mix(in srgb, var(--green) 50%, var(--line));
    }

    .phase-cell.reference {
      color: var(--blue);
      background: color-mix(in srgb, var(--blue) 8%, var(--panel));
    }

    .phase-cell.reference.done {
      background: color-mix(in srgb, var(--green) 16%, var(--panel));
      color: var(--green);
      border-color: color-mix(in srgb, var(--green) 50%, var(--line));
    }

    .context-list {
      display: grid;
      gap: 10px;
      overflow-y: auto;
      padding-right: 2px;
    }

    .context-item {
      padding: 12px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--panel);
    }

    .context-item strong {
      display: block;
      font-size: 13px;
      margin-bottom: 5px;
    }

    .context-item p {
      margin: 0;
      font-size: 12px;
    }

    .toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      min-height: 44px;
      padding: 0 16px;
      border-radius: var(--radius);
      background: var(--ink);
      color: var(--bg);
      display: grid;
      place-items: center;
      opacity: 0;
      pointer-events: none;
      transform: translateY(14px);
      transition: opacity 160ms ease, transform 160ms ease;
      z-index: 10;
      box-shadow: var(--shadow);
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .floating-tip {
      position: fixed;
      z-index: 200;
      max-width: min(320px, calc(100vw - 24px));
      padding: 10px 11px;
      border: 1px solid rgba(147, 197, 253, 0.55);
      border-radius: 8px;
      background: #e9f0fb;
      color: #06111f;
      font-size: 12px;
      line-height: 1.38;
      font-weight: 720;
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.28);
      opacity: 0;
      pointer-events: none;
      transform: translateY(-3px);
      transition: opacity 120ms ease, transform 120ms ease;
    }

    .floating-tip.show {
      opacity: 1;
      transform: translateY(0);
    }

    .mobile-toggle {
      display: none;
    }

    @media (max-width: 1700px) {
      .deck {
        grid-template-columns: 280px minmax(0, 1fr);
      }

      .mission-aside {
        display: none;
      }
    }

    @media (max-width: 1180px) {
      .deck {
        grid-template-columns: 260px minmax(0, 1fr);
      }

      .feature-card h1.long-title {
        font-size: 46px;
      }

      .feature-card h1.step-title {
        font-size: 44px;
      }

    }

    @media (max-width: 880px) {
      .deck {
        grid-template-columns: 1fr;
        padding: 12px;
      }

      .rail {
        position: fixed;
        z-index: 9;
        inset: 12px auto 12px 12px;
        width: min(88vw, 330px);
        height: auto;
        transform: translateX(calc(-100% - 18px));
        transition: transform 180ms ease;
      }

      body.nav-open .rail {
        transform: translateX(0);
      }

      .mobile-toggle {
        display: inline-flex;
      }

      .top-strip {
        grid-template-columns: auto minmax(0, 1fr) auto;
      }

      .top-strip .mode-button {
        display: none;
      }

      .stage,
      .stage-content,
      .stage-hero,
      .provider-grid,
      .fallback-grid,
      .glossary-grid {
        grid-template-columns: 1fr;
      }

      .stage {
        min-height: auto;
      }

      .stage-meta {
        grid-template-columns: 1fr;
      }

      .feature-card h1.long-title {
        font-size: 44px;
      }

      .feature-card h1.step-title {
        font-size: clamp(34px, 7vw, 44px);
      }
    }

    @media (max-width: 680px) {
      .simple-table,
      .simple-table thead,
      .simple-table tbody,
      .simple-table tr,
      .simple-table td {
        display: block;
      }

      .simple-table {
        border: 0;
        background: transparent;
      }

      .simple-table thead {
        display: none;
      }

      .simple-table tbody {

      }

      .simple-table td {

      }

        content: attr(data-label);

        color: var(--blue);
        font-size: 10px;
        font-weight: 850;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
    }

    @media (max-width: 560px) {
      .top-strip {
        grid-template-columns: auto minmax(0, 1fr);
      }

      .top-strip .deck-button.primary {
        grid-column: 1 / -1;
      }

      .stage-footer {
        flex-direction: column;
      }

      .stage-footer .deck-button {
        width: 100%;
      }

      .feature-card h1.long-title {
        font-size: 32px;
        line-height: 1.05;
      }

      .feature-card h1.step-title {
        font-size: clamp(30px, 8vw, 38px);
        white-space: normal;
      }
    }

        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }

      ["ufw status", "Mostra as regras ativas do firewall do Ubuntu."],

      ["VPS Linux", "Servidor na nuvem com Ubuntu onde a instalacao do OpenClaw realmente acontece."],

    ];

    const stateKey = "openclaw-command-deck:v1";
    const themeKey = "openclaw-command-deck-theme:v1";
    const stageKey = "openclaw-command-deck-stage:v1";
    const saved = JSON.parse(localStorage.getItem(stateKey) || "{}");
    let currentIndex = Math.max(0, stages.findIndex((stage) => stage.id === localStorage.getItem(stageKey)));
    if (currentIndex < 0) currentIndex = 0;
    let showingGlossary = false;

    const stageList = document.getElementById("stageList");
    const stagePanel = document.getElementById("stagePanel");
    const progressOrb = document.getElementById("progressOrb");
    const progressValue = document.getElementById("progressValue");
    const progressSummary = document.getElementById("progressSummary");
    const topTitle = document.getElementById("topTitle");
    const topSummary = document.getElementById("topSummary");
    const phaseGrid = document.getElementById("phaseGrid");
    const asideTitle = document.getElementById("asideTitle");
    const asideSummary = document.getElementById("asideSummary");
    const contextList = document.getElementById("contextList");
    const stageSearch = document.getElementById("stageSearch");
    const glossaryToggle = document.getElementById("glossaryToggle");
    const toast = document.getElementById("toast");
    const floatingTip = document.getElementById("floatingTip");

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function checkId(stage, index, prefix = "check") {
      return `${stage.id}-${prefix}-${index}`;
    }

    function providerChoiceId(stage) {
      return `${stage.id}-provider-choice`;
    }

    function stageCompleteId(stage) {
      return `${stage.id}-stage-complete`;
    }

    function selectedProviderIndex(stage) {
      if (!stage.providers || !stage.providers.length) return -1;
      const choice = Number(saved[providerChoiceId(stage)] ?? 0);
      return Number.isInteger(choice) && choice >= 0 && choice < stage.providers.length ? choice : 0;
    }

    function allCheckIds() {
      const ids = [];
      stages.forEach((stage) => ids.push(...stageCheckIds(stage)));
      return ids;
    }

    function stageCheckIds(stage) {
      const ids = [];
      (stage.checks || []).forEach((_, index) => ids.push(checkId(stage, index)));
      if (stage.providers && stage.providers.length) {
        const providerIndex = selectedProviderIndex(stage);
        const provider = stage.providers[providerIndex];
        (provider.checks || []).forEach((_, index) => ids.push(checkId(stage, `${providerIndex}-${index}`, "provider")));
      }
      return ids;
    }

    function stageIsDone(stage) {
      const ids = stageCheckIds(stage);
      if (ids.length) return ids.every((id) => saved[id]);
      return Boolean(saved[stageCompleteId(stage)]);
    }

    function markReferenceStageDone(stage) {
      if (stageCheckIds(stage).length) return;
      saved[stageCompleteId(stage)] = true;
      localStorage.setItem(stateKey, JSON.stringify(saved));
    }

    function sortedGlossaryTerms() {
      return [...glossaryTerms].sort((a, b) => a[0].localeCompare(b[0], "pt-BR", { sensitivity: "base" }));
    }

    function glossaryLetter(term) {
      const first = term.normalize("NFD").replace(/[\u0300-\u036f]/g, "").charAt(0).toUpperCase();
      return /^[A-Z]$/.test(first) ? first : "#";
    }

    function glossaryGroups() {
      return sortedGlossaryTerms().reduce((groups, item) => {
        const letter = glossaryLetter(item[0]);
        groups[letter] = groups[letter] || [];
        groups[letter].push(item);
        return groups;
      }, {});
    }

    function renderGlossaryStage() {
      const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
      const groups = glossaryGroups();
      const letterIndex = alphabet
        .map((letter) => groups[letter]
          ? `<a class="letter-link" href="#letter-${letter}">${letter}</a>`
          : `<span class="letter-link disabled">${letter}</span>`)
        .join("");
      const sections = alphabet
        .filter((letter) => groups[letter])
        .map((letter) => `
          <section class="glossary-section" id="letter-${letter}">
            <div class="letter-heading">${letter}</div>
            <div class="glossary-grid">
              ${groups[letter].map(([term, description]) => `
                <article class="glossary-card">
                  <strong>${escapeHtml(term)}</strong>
                  <p>${escapeHtml(description)}</p>
                </article>
              `).join("")}
            </div>
          </section>
        `)
        .join("");

      topTitle.textContent = "Glossario tecnico A-Z";
      topSummary.textContent = `${glossaryTerms.length} termos tecnicos explicados em uma frase.`;

      stagePanel.innerHTML = `
        <div class="glossary-stage">
          <div class="glossary-hero">
            <div class="kicker">Glossario tecnico</div>
            <h1>Indice A-Z</h1>
            <p>Termos da instalacao explicados de forma direta, sem depender de outro termo tecnico para entender.</p>
            <button class="deck-button" id="backToGuide" type="button">Voltar ao passo atual</button>
          </div>
          <div class="letter-index" aria-label="Indice alfabetico">${letterIndex}</div>
          <div class="glossary-sections">${sections}</div>
          <div class="stage-footer">
            <button class="deck-button" id="backToGuideFooter" type="button">Voltar ao guia</button>
            <button class="deck-button primary" id="nextFromGlossary" type="button">Avancar</button>
          </div>
        </div>
      `;

      ["backToGuide", "backToGuideFooter"].forEach((id) => {
        document.getElementById(id).addEventListener("click", () => {
          showingGlossary = false;
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
      });
      document.getElementById("nextFromGlossary").addEventListener("click", () => moveStage(1));
    }

    function renderRail() {
      const query = stageSearch.value.trim().toLowerCase();
      glossaryToggle.classList.toggle("active", showingGlossary);
      glossaryToggle.setAttribute("aria-pressed", String(showingGlossary));
      glossaryToggle.querySelector("span").textContent = showingGlossary ? "Fechar" : "Abrir";
      stageList.innerHTML = stages
        .map((stage, index) => ({ stage, index }))
        .filter(({ stage }) => !query || `${stage.title} ${stage.summary} ${stage.kicker}`.toLowerCase().includes(query))
        .map(({ stage, index }) => {
          const done = stageIsDone(stage);
          const active = !showingGlossary && index === currentIndex;
          return `<button class="stage-button ${active ? "active" : ""} ${done ? "done" : ""}" type="button" data-stage="${index}">
            <span class="stage-no">${stage.no}</span>
            <span><strong>${escapeHtml(stage.title)}</strong><small>${escapeHtml(stage.kicker)}</small></span>
            <span class="stage-dot" aria-hidden="true"></span>
          </button>`;
        })
        .join("");

      stageList.querySelectorAll("[data-stage]").forEach((button) => {
        button.addEventListener("click", () => {
          currentIndex = Number(button.dataset.stage);
          showingGlossary = false;
          document.body.classList.remove("nav-open");
          render();
        });
      });
    }

    function commandText(code) {
      return String(code || "").replace(/(^|[^\\])\\n/g, (_, prefix) => `${prefix}\n`);
    }

    function commandTip(command) {
      const code = commandText(command.code || "");
      const label = command.label || "Comando";
      const lower = code.toLowerCase();

      if (command.tip) return command.tip;
      if (lower.includes("@openai/codex") || lower.includes("codex --version")) {
        return "Rode no terminal SSH da VPS Linux, de preferencia no usuario que vai usar o agente. Nao e comando do PowerShell local.";
      }
      if (lower.includes("@anthropic-ai/claude-code") || lower.includes("claude --version")) {
        return "Rode no terminal SSH da VPS Linux, de preferencia no usuario que vai usar o agente. Nao use sudo antes do npm install.";
      }
      if (lower.includes("uname -a") || lower.includes("cat /etc/os-release")) {
        return "Rode dentro da VPS Linux para confirmar que voce esta no servidor Ubuntu antes de chamar Codex ou Claude Code.";
      }
      if (lower.includes("ssh-keygen") || lower.includes("userprofile") || lower.includes("~/.ssh")) {
        return "Rode no PowerShell ou Terminal do seu computador local. Use para criar ou mostrar a chave SSH antes de entrar na VPS.";
      }
      if (lower.includes("ssh root@") || lower.includes("ssh -p porta root@")) {
        return "Rode no PowerShell ou Terminal do seu computador local. Troque IP_DA_VPS e PORTA antes de apertar Enter.";
      }
      if (lower.includes("ssh -p 2222 openclaw@")) {
        return "Rode no PowerShell ou Terminal do seu computador local. Este teste confirma se a nova porta SSH funciona.";
      }
      if (lower.includes("curl -fssl") || lower.includes("/tmp/setup.sh") || lower.includes("bash -n")) {
        return "Rode dentro da VPS como root. Este comando baixa, valida ou executa o setup Bare Metal.";
      }
      if (lower.includes("sudo -iu openclaw")) {
        return "Rode dentro da VPS, normalmente como root. O proprio comando entra no usuario openclaw antes de executar a acao.";
      }
      if (lower.includes("sed -i") || lower.includes("ufw ") || lower.includes("systemctl")) {
        return "Rode dentro da VPS como root. Use somente depois de confirmar que a etapa anterior funcionou.";
      }
      if (lower.includes("cat /etc/os-release") || lower.includes("free -h") || lower.includes("df -h")) {
        return "Rode dentro da VPS como root para conferir sistema, memoria e disco antes de continuar.";
      }
      if (lower.startsWith("openclaw ")) {
        return "Rode dentro da VPS como usuario openclaw, depois de entrar com ssh -p 2222 openclaw@IP_DA_VPS.";
      }
      return `Antes de colar "${label}", confira em qual ambiente a etapa manda executar e substitua os placeholders do comando.`;
    }

    function commandHtml(command) {
      const tip = commandTip(command);
      return `<div class="command-card">
        <div class="command-head">
          <span class="command-title">
            <span>${escapeHtml(command.label)}</span>
            <span class="command-help" tabindex="0" aria-label="${escapeHtml(tip)}" data-tip="${escapeHtml(tip)}"><svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"></circle><path d="M12 11v5"></path><path d="M12 8h.01"></path></svg></span>
          </span>
          <button class="copy-button" type="button">Copiar</button>
        </div>
        <pre><code>${escapeHtml(commandText(command.code))}</code></pre>
      </div>`;
    }

    function checkHtml(id, label) {
      return `<div class="check-item">
        <input id="${escapeHtml(id)}" type="checkbox" ${saved[id] ? "checked" : ""} />
        <label for="${escapeHtml(id)}">${escapeHtml(label)}</label>
      </div>`;
    }

    function tableCellValue(cell) {
      return typeof cell === "object" && cell !== null ? cell.text : cell;
    }

    function tableCellTip(cell) {
      return typeof cell === "object" && cell !== null ? cell.tip : "";
    }

    function tableCellUrl(cell) {
      return typeof cell === "object" && cell !== null ? cell.url : "";
    }

    function tableCellHtml(cell, label, cellIndex, totalCells) {
      const value = tableCellValue(cell);
      const tip = tableCellTip(cell);
      const url = tableCellUrl(cell);
      const edgeClass = cellIndex === totalCells - 1 ? " tip-left" : "";
      const help = tip ? `<span class="cell-help${edgeClass}" tabindex="0" aria-label="${escapeHtml(tip)}" data-tip="${escapeHtml(tip)}"><svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"></circle><path d="M12 11v5"></path><path d="M12 8h.01"></path></svg></span>` : "";
      const content = url
        ? `<a class="table-link" href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer"><code>${escapeHtml(value)}</code></a>`
        : `<code>${escapeHtml(value)}</code>`;
      return `<td data-label="${escapeHtml(label || "")}"><span class="table-cell">${content}${help}</span></td>`;
    }

    function tableHtml(table) {
      if (!table) return "";
      return `<table class="simple-table">
        <thead><tr>${table.head.map((head) => `<th>${escapeHtml(head)}</th>`).join("")}</tr></thead>
        <tbody>${table.rows.map((row) => `<tr>${row.map((cell, cellIndex) => tableCellHtml(cell, table.head[cellIndex], cellIndex, row.length)).join("")}</tr>`).join("")}</tbody>
      </table>`;
    }

    function linksHtml(stage) {
      if (!stage.links) return "";
      return stage.links.map((link) => `
        <a class="link-card" href="${escapeHtml(link.url)}" target="_blank" rel="noopener noreferrer">
          <div class="card-kicker">Link recomendado</div>
          <div class="link-title">
            <strong>${escapeHtml(link.label)}</strong>
            <span class="link-cta">CLIQUE AQUI</span>
          </div>
          <span class="link-body">${escapeHtml(link.body || link.url)}</span>
        </a>
      `).join("");
    }

    function tablesHtml(stage) {
      return [stage.table, ...(stage.tables || [])].map(tableHtml).join("");
    }

    function providersHtml(stage) {
      if (!stage.providers) return "";
      const activeProviderIndex = selectedProviderIndex(stage);
      return `<div class="provider-grid">${stage.providers.map((provider, providerIndex) => {
        const active = providerIndex === activeProviderIndex;
        const providerChecks = (provider.checks || []).map((check, index) => checkHtml(checkId(stage, `${providerIndex}-${index}`, "provider"), check)).join("");
        const extraCommands = active ? (provider.extraCommands || []).map(commandHtml).join("") : "";
        return `
        <article class="provider-card ${active ? "active" : ""}">
          <div class="card-kicker">Caminho ${providerIndex + 1}</div>
          <strong>${escapeHtml(provider.title)}</strong>
          <p>${escapeHtml(provider.body)}</p>
          <button class="deck-button provider-choice ${active ? "active" : ""}" type="button" data-provider-choice="${providerIndex}">
            ${active ? "Caminho selecionado" : "Usar este caminho"}
          </button>
          ${commandHtml({ label: provider.title, code: provider.code })}
          ${extraCommands}
          ${active ? `<div class="check-grid">${providerChecks}</div>` : `<div class="provider-hint">Escolha este caminho para mostrar e contar somente os checkpoints dele.</div>`}
        </article>
      `; }).join("")}</div>`;
    }

    function agentFallbackHtml(stage) {
      const fallback = stage.agentFallback;
      if (!fallback) return "";
      const notes = (fallback.notes || []).map((note) => `<div class="note-card">${escapeHtml(note)}</div>`).join("");
      const commands = (fallback.commands || []).map(commandHtml).join("");
      return `
        <section class="fallback-panel">
          <div class="fallback-head">
            <div class="kicker">${escapeHtml(fallback.kicker || "Sugestao")}</div>
            <strong>${escapeHtml(fallback.title)}</strong>
            <p>${escapeHtml(fallback.body)}</p>
          </div>
          ${notes ? `<div class="fallback-grid">${notes}</div>` : ""}
          ${commands ? `<div class="fallback-grid">${commands}</div>` : ""}
          ${fallback.table ? tableHtml(fallback.table) : ""}
        </section>
      `;
    }

    function renderStage() {
      const stage = stages[currentIndex];
      topTitle.textContent = stage.title;
      topSummary.textContent = stage.summary;
      asideTitle.textContent = `${stage.no} - ${stage.title}`;
      asideSummary.textContent = stage.highlight;
      localStorage.setItem(stageKey, stage.id);

      const commands = (stage.commands || []).map(commandHtml).join("");
      const leftNotes = (stage.leftNotes || []).map((note) => `<div class="note-card">${escapeHtml(note)}</div>`).join("");
      const checks = (stage.checks || []).map((check, index) => checkHtml(checkId(stage, index), check)).join("");
      const notes = (stage.notes || []).map((note) => `<div class="note-card">${escapeHtml(note)}</div>`).join("");
      const checkCount = stageCheckIds(stage).length;
      const doneCount = stageCheckIds(stage).filter((id) => saved[id]).length;
      const referenceDone = !checkCount && Boolean(saved[stageCompleteId(stage)]);
      const checkpointLabel = checkCount ? `${doneCount}/${checkCount}` : "Consulta";
      const statusLabel = checkCount ? (doneCount === checkCount ? "Completo" : "Em andamento") : (referenceDone ? "Concluido" : "Consulta");
      const titleClass = stage.id === "uso" ? "step-title" : (stage.title.length > 38 ? "long-title" : "");

      stagePanel.innerHTML = `
        <div class="stage-hero">
          <div class="feature-card">
            <div class="kicker">${escapeHtml(stage.kicker)}</div>
            <h1 class="${titleClass}">${escapeHtml(stage.title)}</h1>
            <p>${escapeHtml(stage.summary)}</p>
          </div>
          <div class="stage-meta">
            <div class="mini-card"><div class="mini-label">Etapa</div><strong>${escapeHtml(stage.no)}</strong></div>
            <div class="mini-card"><div class="mini-label">Checkpoints</div><strong>${checkpointLabel}</strong></div>
            <div class="mini-card"><div class="mini-label">Foco</div><strong>${escapeHtml(stage.highlight)}</strong></div>
            <div class="mini-card"><div class="mini-label">Status</div><strong>${statusLabel}</strong></div>
          </div>
        </div>
        <div class="stage-content ${stage.providers ? "provider-stage-content" : ""}">
          <div class="content-column">
            ${linksHtml(stage)}
            ${providersHtml(stage)}
            ${commands}
            ${leftNotes}
            ${tablesHtml(stage)}
          </div>
          <div class="content-column">
            ${checks ? `<div class="check-grid">${checks}</div>` : `<div class="note-card">Esta etapa e de consulta. Use os comandos quando precisar.</div>`}
            ${notes}
          </div>
        </div>
        ${agentFallbackHtml(stage)}
        <div class="stage-footer">
          <button class="deck-button" id="prevStage" type="button">Voltar</button>
          <button class="deck-button primary" id="nextStage" type="button">Avancar</button>
        </div>
      `;

      stagePanel.querySelectorAll('input[type="checkbox"]').forEach((input) => {
        input.addEventListener("change", () => {
          saved[input.id] = input.checked;
          localStorage.setItem(stateKey, JSON.stringify(saved));
          render();
        });
      });

      stagePanel.querySelectorAll("[data-provider-choice]").forEach((button) => {
        button.addEventListener("click", () => {
          saved[providerChoiceId(stage)] = Number(button.dataset.providerChoice);
          localStorage.setItem(stateKey, JSON.stringify(saved));
          render();
        });
      });

      stagePanel.querySelectorAll(".copy-button").forEach((button) => {
        button.addEventListener("click", async () => {
          const code = button.closest(".command-card").querySelector("code").innerText;
          await copyText(code);
          button.textContent = "Copiado";
          showToast("Comando copiado");
          setTimeout(() => (button.textContent = "Copiar"), 1200);
        });
      });

      document.getElementById("prevStage").addEventListener("click", () => moveStage(-1));
      document.getElementById("nextStage").addEventListener("click", () => moveStage(1));
    }

    function renderAside() {
      phaseGrid.innerHTML = stages.map((stage) => {
        const ids = stageCheckIds(stage);
        const done = stageIsDone(stage);
        return `<div class="phase-cell ${done ? "done" : ""} ${ids.length ? "" : "reference"}">${stage.no}</div>`;
      }).join("");

      if (showingGlossary) {
        asideTitle.textContent = "Glossario tecnico A-Z";
        asideSummary.textContent = `${glossaryTerms.length} termos em linguagem direta.`;
        contextList.innerHTML = [
          `<div class="context-item"><strong>Como usar</strong><p>Clique em uma letra do indice e leia somente o termo que travou o passo.</p></div>`,
          `<div class="context-item"><strong>Regra</strong><p>Cada explicacao tem uma frase para consulta rapida durante a instalacao.</p></div>`
        ].join("");
        return;
      }

      const stage = stages[currentIndex];
      const commands = (stage.commands || []).slice(0, 4);
      contextList.innerHTML = [
        `<div class="context-item"><strong>Trocas antes de colar</strong><p>IP_DA_VPS = IP publico da sua VPS; PORTA = 2222; EMAIL = seu e-mail; PROVIDER/MODELO = modelo escolhido.</p></div>`,
        `<div class="context-item"><strong>IA recomendada</strong><p>Na aula, use openai-codex/gpt-5.4 se tiver ChatGPT/Codex; use o assistente/API key apenas se ja tiver outro provider.</p></div>`,
        ...commands.map((command) => `<div class="context-item"><strong>${escapeHtml(command.label)}</strong><p>${escapeHtml(commandText(command.code).split("\n")[0])}</p></div>`)
      ].join("");
    }

    function renderProgress() {
      const ids = allCheckIds();
      const done = ids.filter((id) => saved[id]).length;
      const total = ids.length;
      const percent = total ? Math.round((done / total) * 100) : 0;
      progressValue.textContent = `${percent}%`;
      progressSummary.textContent = `${done} de ${total}`;
      progressOrb.style.background = `conic-gradient(var(--green) ${percent * 3.6}deg, var(--line) 0deg)`;
    }

    function render() {
      renderRail();
      if (showingGlossary) {
        renderGlossaryStage();
      } else {
        renderStage();
      }
      renderAside();
      renderProgress();
    }

    function moveStage(direction) {
      const wasGlossary = showingGlossary;
      if (!wasGlossary && direction > 0) {
        markReferenceStageDone(stages[currentIndex]);
      }
      showingGlossary = false;
      currentIndex = (currentIndex + direction + stages.length) % stages.length;
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1400);
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function showFloatingTip(trigger) {
      const message = trigger?.dataset?.tip;
      if (!message) return;
      floatingTip.textContent = message;
      floatingTip.setAttribute("aria-hidden", "false");
      floatingTip.classList.add("show");

      const rect = trigger.getBoundingClientRect();
      const margin = 12;
      const maxWidth = Math.min(320, window.innerWidth - margin * 2);
      floatingTip.style.width = `${maxWidth}px`;
      floatingTip.style.left = "0px";
      floatingTip.style.top = "0px";

      const tipRect = floatingTip.getBoundingClientRect();
      const left = clamp(rect.left, margin, window.innerWidth - tipRect.width - margin);
      let top = rect.bottom + 8;
      if (top + tipRect.height > window.innerHeight - margin) {
        top = rect.top - tipRect.height - 8;
      }
      floatingTip.style.left = `${left}px`;
      floatingTip.style.top = `${Math.max(margin, top)}px`;
    }

    function hideFloatingTip() {
      floatingTip.classList.remove("show");
      floatingTip.setAttribute("aria-hidden", "true");
    }

    async function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }
      const area = document.createElement("textarea");
      area.value = text;
      area.setAttribute("readonly", "");
      area.style.position = "fixed";
      area.style.left = "-9999px";
      document.body.appendChild(area);
      area.select();
      document.execCommand("copy");
      area.remove();
    }

    const themeIcons = {
      sun: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path></svg>',
      moon: '<svg viewBox="0 0 24 24"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.5 6.5 0 0 0 9.8 9.8Z"></path></svg>'
    };

    function setThemeButton(button, icon, label) {
      button.innerHTML = `<span class="theme-icon" aria-hidden="true">${themeIcons[icon]}</span>`;
      button.setAttribute("aria-label", label);
      button.setAttribute("title", label);
    }

    function applyTheme(theme) {
      document.documentElement.dataset.theme = theme;
      const label = theme === "dark" ? "Alternar para tema claro" : "Alternar para tema escuro";
      const icon = theme === "dark" ? "sun" : "moon";
      setThemeButton(document.getElementById("themeToggle"), icon, label);
      setThemeButton(document.getElementById("themeToggleTop"), icon, label);
      localStorage.setItem(themeKey, theme);
    }

    function toggleTheme() {
      applyTheme(document.documentElement.dataset.theme === "dark" ? "light" : "dark");
      showToast(document.documentElement.dataset.theme === "dark" ? "Tema escuro ativo" : "Tema claro ativo");
    }

    document.getElementById("themeToggle").addEventListener("click", toggleTheme);
    document.getElementById("themeToggleTop").addEventListener("click", toggleTheme);
    document.getElementById("nextTop").addEventListener("click", () => moveStage(1));
    document.getElementById("menuButton").addEventListener("click", () => document.body.classList.toggle("nav-open"));
    document.getElementById("resetProgress").addEventListener("click", () => {
      if (!confirm("Limpar todos os checkpoints marcados neste navegador?")) return;
      Object.keys(saved).forEach((key) => delete saved[key]);
      localStorage.setItem(stateKey, JSON.stringify(saved));
      render();
      showToast("Progresso limpo");
    });
    stageSearch.addEventListener("input", renderRail);
    glossaryToggle.addEventListener("click", () => {
      showingGlossary = !showingGlossary;
      document.body.classList.remove("nav-open");
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
      showToast(showingGlossary ? "Glossario aberto" : "Voltou ao guia");
    });

    document.addEventListener("mouseover", (event) => {
      const trigger = event.target.closest("[data-tip]");
      if (!trigger) return;
      showFloatingTip(trigger);
    });

    document.addEventListener("mouseout", (event) => {
      const trigger = event.target.closest("[data-tip]");
      if (!trigger) return;
      if (event.relatedTarget && trigger.contains(event.relatedTarget)) return;
      hideFloatingTip();
    });

    document.addEventListener("focusin", (event) => {
      const trigger = event.target.closest("[data-tip]");
      if (trigger) showFloatingTip(trigger);
    });

    document.addEventListener("focusout", (event) => {
      if (event.target.closest("[data-tip]")) hideFloatingTip();
    });

    window.addEventListener("scroll", hideFloatingTip, true);
    window.addEventListener("resize", hideFloatingTip);

    window.addEventListener("keydown", (event) => {
      if (event.target.matches("input, textarea")) return;
      hideFloatingTip();
      if (event.key.toLowerCase() === "j") moveStage(1);
      if (event.key.toLowerCase() === "k") moveStage(-1);
    });

    applyTheme(localStorage.getItem(themeKey) || "dark");
    render();
  </script>
</body>
</html>
