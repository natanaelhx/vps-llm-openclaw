<!doctype html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VPS + LLM | Command Deck</title>
  <style>
    :root {
      --bg: #090e17;
      --panel: #0f1623;
      --panel-2: #131d2d;
      --panel-3: #182438;
      --ink: #eef5ff;
      --muted: #97a6ba;
      --line: #263449;
      --line-strong: #3d506d;
      --blue: #74a9ff;
      --green: #4ade80;
      --amber: #f7c948;
      --rose: #fb7185;
      --cyan: #22d3ee;
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.26);
      --radius: 8px;
      color-scheme: dark;
    }

    :root[data-theme="light"] {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --panel-2: #f1f5fb;
      --panel-3: #e9eef7;
      --ink: #101828;
      --muted: #5f6f84;
      --line: #d8e1ee;
      --line-strong: #bdc9da;
      --blue: #2563eb;
      --green: #15803d;
      --amber: #a16207;
      --rose: #be123c;
      --cyan: #0891b2;
      --shadow: 0 20px 48px rgba(16, 24, 40, 0.12);
      color-scheme: light;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 0%, rgba(116, 169, 255, 0.14), transparent 36vw),
        radial-gradient(circle at 88% 10%, rgba(74, 222, 128, 0.08), transparent 32vw),
        radial-gradient(circle at 50% 100%, rgba(251, 113, 133, 0.06), transparent 38vw),
        var(--bg);
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    a {
      color: var(--blue);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .deck {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr) 330px;
      gap: 16px;
      padding: 16px;
    }

    .rail,
    .stage,
    .mission-aside,
    .top-strip,
    .mini-card,
    .command-card,
    .check-item,
    .provider-card {
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--panel) 94%, transparent);
      backdrop-filter: blur(20px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .rail {
      position: sticky;
      top: 16px;
      height: calc(100vh - 32px);
      display: grid;
      grid-template-rows: auto auto auto minmax(0, 1fr) auto;
      gap: 14px;
      padding: 16px;
      overflow: hidden;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--ink);
      text-decoration: none;
      border-radius: var(--radius);
    }

    .brand:hover {
      text-decoration: none;
    }

    .brand:focus-visible {
      outline: 2px solid var(--blue);
      outline-offset: 4px;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--panel-2);
      border: 1px solid var(--line);
      overflow: hidden;
      padding: 4px;
    }

    .brand-mark img,
    .brand-mark svg {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }

    .brand strong,
    .stage-title strong {
      display: block;
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    .brand span,
    .stage-title span {
      color: var(--muted);
      font-size: 12px;
      display: block;
      margin-top: 4px;
    }

    .progress-orb {
      display: grid;
      grid-template-columns: 86px minmax(0, 1fr);
      align-items: center;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-2);
    }

    .orb {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: conic-gradient(var(--green) 0deg, var(--line) 0deg);
      position: relative;
    }

    .orb::after {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: inherit;
      background: var(--panel);
    }

    .orb span {
      position: relative;
      z-index: 1;
      font-weight: 850;
      font-size: 18px;
    }

    .progress-copy p {
      margin: 4px 0 0;
      color: var(--muted);
      line-height: 1.35;
      font-size: 12px;
    }

    .rail-tools {
      display: grid;
      gap: 8px;
    }

    .rail-box {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-2);
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .rail-box-label {
      color: var(--blue);
      font-size: 11px;
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .rail-search {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      background: var(--panel);
      color: var(--ink);
      outline: none;
    }

    .rail-search:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--blue) 18%, transparent);
    }

    .glossary-toggle {
      width: 100%;
      justify-content: space-between;
      padding: 0 12px;
    }

    .glossary-toggle.active {
      border-color: var(--blue);
      background: color-mix(in srgb, var(--blue) 16%, var(--panel-2));
    }

    .glossary-toggle span {
      opacity: 0.8;
    }

    .glossary-stage {
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .glossary-hero {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--blue) 12%, transparent), transparent 48%),
        var(--panel-2);
      padding: 18px;
    }

    .glossary-hero h1 {
      font-size: clamp(34px, 5vw, 56px);
      line-height: 1;
      margin-bottom: 10px;
    }

    .letter-index {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(36px, 1fr));
      gap: 6px;
    }

    .letter-link {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--panel-2);
      color: var(--ink);
      font-size: 12px;
      font-weight: 850;
      text-decoration: none;
    }

    .letter-link.disabled {
      opacity: 0.35;
      pointer-events: none;
    }

    .glossary-sections {
      display: grid;
      gap: 14px;
    }

    .glossary-section {
      display: grid;
      gap: 10px;
    }

    .letter-heading {
      color: var(--blue);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .glossary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .glossary-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      padding: 12px;
      display: grid;
      gap: 6px;
    }

    .glossary-card strong {
      font-size: 13px;
      color: var(--ink);
    }

    .glossary-card p {
      margin: 0;
      font-size: 12px;
      line-height: 1.45;
    }

    .stage-list {
      display: grid;
      gap: 8px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .stage-phase-label {
      margin: 10px 8px 4px;
      color: var(--blue);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .stage-button {
      width: 100%;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      color: var(--muted);
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr) 22px;
      align-items: center;
      gap: 10px;
      padding: 9px;
      text-align: left;
    }

    .stage-button:hover {
      background: var(--panel-2);
      color: var(--ink);
    }

    .stage-button.active {
      border-color: var(--line-strong);
      background: linear-gradient(135deg, color-mix(in srgb, var(--blue) 9%, var(--panel)), var(--panel-2));
      color: var(--ink);
    }

    .stage-button.done .stage-no {
      background: color-mix(in srgb, var(--green) 18%, var(--panel));
      color: var(--green);
    }

    .stage-no {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--panel-3);
      color: var(--blue);
      font-size: 12px;
      font-weight: 820;
    }

    .stage-button strong {
      font-size: 13px;
      line-height: 1.2;
      display: block;
    }

    .stage-button small {
      color: var(--muted);
      font-size: 11px;
    }

    .stage-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid var(--line-strong);
      justify-self: center;
    }

    .stage-button.done .stage-dot {
      background: var(--green);
      border-color: var(--green);
    }

    .rail-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .deck-button,
    .copy-button,
    .mode-button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-2);
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 720;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
    }

    .deck-button:hover,
    .copy-button:hover,
    .mode-button:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
      background: var(--panel-3);
    }

    .theme-icon-button {
      width: 44px;
      min-width: 44px;
      padding: 0;
    }

    .theme-icon {
      width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .theme-icon svg {
      width: 18px;
      height: 18px;
      display: block;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2.2;
    }

    .deck-button.primary {
      background: linear-gradient(135deg, var(--blue), var(--green));
      color: #06111f;
      border-color: transparent;
    }

    .workbench {
      min-width: 0;
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .top-strip {
      min-height: 84px;
      padding: 14px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 12px;
      align-items: center;
      box-shadow: none;
    }

    .stage-title {
      min-width: 0;
    }

    .stage-title strong {
      font-size: clamp(20px, 3vw, 32px);
      overflow-wrap: anywhere;
    }

    .stage-title span {
      line-height: 1.45;
      max-width: 760px;
      overflow-wrap: anywhere;
    }

    .stage {
      padding: 18px;
      min-height: 620px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 16px;
      overflow: hidden;
    }

    .stage-hero {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(240px, 0.9fr);
      gap: 14px;
    }

    .feature-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--blue) 12%, transparent), transparent 48%),
        var(--panel-2);
      padding: 18px;
      min-height: 180px;
      display: grid;
      align-content: end;
    }

    .feature-card .kicker,
    .mini-label,
    .card-kicker {
      color: var(--blue);
      font-size: 11px;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 12px;
      font-size: clamp(34px, 5.4vw, 64px);
      line-height: 1;
      max-width: 900px;
    }

    .feature-card h1 {
      max-width: 100%;
      overflow-wrap: break-word;
      text-wrap: balance;
    }

    .feature-card h1.long-title {
      font-size: 50px;
      line-height: 1.03;
    }

    .feature-card h1.step-title {
      font-size: clamp(34px, 4vw, 50px);
      line-height: 1.04;
      white-space: normal;
      overflow-wrap: anywhere;
    }

    h2 {
      font-size: clamp(24px, 4vw, 42px);
      line-height: 1.05;
      margin-bottom: 10px;
    }

    h3 {
      font-size: 16px;
      margin-bottom: 10px;
    }

    p {
      color: var(--muted);
      line-height: 1.58;
    }

    .stage-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .mini-card {
      box-shadow: none;
      padding: 14px;
      background: var(--panel-2);
    }

    .mini-card strong {
      display: block;
      margin-top: 8px;
      font-size: 20px;
      max-width: 100%;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .stage-content {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 0.8fr);
      gap: 14px;
      min-height: 0;
      min-width: 0;
    }

    .stage-content.provider-stage-content {
      grid-template-columns: minmax(0, 1fr);
    }

    .stage-content.provider-stage-content > .content-column:nth-child(2) {
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }

    .content-column {
      display: grid;
      gap: 12px;
      align-content: start;
      min-width: 0;
    }

    .command-card {
      box-shadow: none;
      overflow: visible;
      background: #050914;
      position: relative;
    }

    :root[data-theme="light"] .command-card {
      background: #111827;
    }

    .command-head {
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 10px 0 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      color: #dce7f7;
      font-size: 12px;
    }

    .command-title {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 7px;
      font-weight: 850;
    }

    .command-title > span:first-child {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .command-help {
      position: relative;
      flex: 0 0 auto;
      width: 18px;
      height: 18px;
      border: 1px solid rgba(147, 197, 253, 0.55);
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      color: #93c5fd;
      background: rgba(147, 197, 253, 0.08);
      cursor: help;
    }

    .command-help svg {
      width: 11px;
      height: 11px;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2.4;
    }

    .command-help::after {
      content: attr(data-tip);
      position: absolute;
      left: auto;
      right: 0;
      top: calc(100% + 9px);
      z-index: 40;
      width: min(310px, 72vw);
      padding: 10px 11px;
      border: 1px solid rgba(147, 197, 253, 0.55);
      border-radius: 8px;
      background: #e9f0fb;
      color: #06111f;
      font-size: 12px;
      line-height: 1.38;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 700;
      white-space: normal;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-4px);
      transition: opacity 120ms ease, transform 120ms ease;
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.28);
    }

    .command-help:hover::after,
    .command-help:focus-visible::after {
      opacity: 1;
      transform: translateY(0);
    }

    .command-help::after,
    .cell-help::after {
      display: none;
    }

    .copy-button {
      min-height: 30px;
      padding: 0 10px;
      color: white;
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.18);
      font-size: 12px;
    }

    pre {
      margin: 0;
      padding: 15px;
      color: #e9f0fb;
      overflow-x: auto;
      line-height: 1.55;
      font-size: 13px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    code {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 0.95em;
    }

    .inline-code {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--ink);
      border-radius: 6px;
      padding: 1px 5px;
      font-size: 0.92em;
    }

    .check-grid {
      display: grid;
      gap: 8px;
    }

    .check-item {
      box-shadow: none;
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      padding: 11px 12px;
      background: var(--panel-2);
    }

    .check-item input {
      appearance: none;
      width: 20px;
      height: 20px;
      border: 1.5px solid var(--line-strong);
      border-radius: 6px;
      margin: 0;
      background: var(--panel);
      display: grid;
      place-items: center;
    }

    .check-item input:checked {
      background: var(--green);
      border-color: var(--green);
    }

    .check-item input:checked::after {
      content: "";
      width: 9px;
      height: 5px;
      border-left: 2px solid #06111f;
      border-bottom: 2px solid #06111f;
      transform: rotate(-45deg);
      margin-top: -2px;
    }

    .check-item label {
      line-height: 1.42;
      cursor: pointer;
      color: var(--ink);
      overflow-wrap: anywhere;
    }

    .check-item:has(input:checked) {
      border-color: color-mix(in srgb, var(--green) 50%, var(--line));
      background: color-mix(in srgb, var(--green) 10%, var(--panel));
    }

    .feature-card h1,
    .mini-card strong {
      color: var(--ink);
    }

    .mini-card strong {
      overflow-wrap: anywhere;
    }

    :root[data-theme="light"] .feature-card h1,
    :root[data-theme="light"] .mini-card strong,
    :root[data-theme="light"] .check-item label {
      color: #101828;
    }

    :root[data-theme="light"] .check-item:has(input:checked) label {
      color: #244034;
    }

    .note-card {
      border: 1px solid var(--line);
      border-left: 3px solid var(--amber);
      border-radius: var(--radius);
      padding: 13px 14px;
      background: color-mix(in srgb, var(--amber) 8%, var(--panel));
      color: var(--ink);
      line-height: 1.5;
    }

    .step-guide {
      border: 1px solid color-mix(in srgb, var(--blue) 34%, var(--line));
      border-radius: var(--radius);
      padding: 14px;
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--blue) 7%, transparent), transparent 72%),
        var(--panel-2);
      display: grid;
      gap: 12px;
    }

    .step-guide-head {
      display: grid;
      gap: 6px;
    }

    .step-guide-head strong {
      font-size: clamp(18px, 1.4vw, 24px);
      line-height: 1.18;
    }

    .step-guide-head p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .substep-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
      counter-reset: substep;
    }

    .substep {
      counter-increment: substep;
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--panel) 88%, transparent);
    }

    .substep::before {
      content: counter(substep, decimal-leading-zero);
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: color-mix(in srgb, var(--blue) 16%, var(--panel));
      color: var(--blue);
      font-size: 12px;
      font-weight: 900;
    }

    .substep-body {
      min-width: 0;
      display: grid;
      gap: 6px;
    }

    .substep-title {
      color: var(--ink);
      font-weight: 850;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .substep-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .substep-chip {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--blue);
      background: var(--panel);
      font-size: 11px;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .substep p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .substep-result {
      color: var(--ink);
    }

    .substep-mini-list {

    .fallback-grid {

    .fallback-grid .command-card:first-child,

    }

    .provider-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .provider-card {
      box-shadow: none;
      padding: 14px;
      background: var(--panel-2);

      gap: 10px;
      align-content: start;
      transition: border-color 140ms ease, background 140ms ease;

    .provider-card.active {

    }

    .provider-hint {
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      padding: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      background: color-mix(in srgb, var(--panel) 70%, transparent);
    }

    .provider-card strong {
      font-size: 15px;
    }

    .provider-card p {
      margin: 0;
      font-size: 13px;
    }

    .link-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-2);
      padding: 14px;
      display: grid;
      gap: 8px;

      color: var(--ink);
    }

    .link-card:hover {
      border-color: var(--line-strong);
      background: var(--panel-3);
      text-decoration: none;
    }

    .link-card strong {
      font-size: 15px;
    }

    .link-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;

    .link-card .link-body {

      line-height: 1.45;

    }

    .link-card .link-cta {

      padding: 5px 10px;

      font-weight: 900;
      letter-spacing: 0.04em;

    }

    .simple-table {

      border-collapse: collapse;

    .simple-table th,

      padding: 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;

      stroke: currentColor;

      stroke-linejoin: round;

      font-size: 13px;
      margin-bottom: 5px;

    .toast {

      background: var(--ink);

    .toast.show {

      transform: translateY(0);
    }

    .floating-tip {
      position: fixed;
      z-index: 200;
      max-width: min(320px, calc(100vw - 24px));
      padding: 10px 11px;
      border: 1px solid rgba(147, 197, 253, 0.55);
      border-radius: 8px;
      background: #e9f0fb;
      color: #06111f;
      font-size: 12px;
      line-height: 1.38;
      font-weight: 720;
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.28);
      opacity: 0;
      pointer-events: none;
      transform: translateY(-3px);
      transition: opacity 120ms ease, transform 120ms ease;
    }

    .floating-tip.show {
      opacity: 1;
      transform: translateY(0);
    }

    .mobile-toggle {
      display: none;
    }

    @media (max-width: 1700px) {
      .deck {
        grid-template-columns: 280px minmax(0, 1fr);
      }

      .mission-aside {
        display: none;
      }

      .deck {
        grid-template-columns: 260px minmax(0, 1fr);

        font-size: 46px;

    }

    @media (max-width: 880px) {
      .deck {
        grid-template-columns: 1fr;

      .mobile-toggle {

        display: none;

      .stage,
      .stage-content,
      .stage-hero,

      .glossary-grid {
        grid-template-columns: 1fr;
      }

      .stage {
        min-height: auto;
      }

      .stage-meta {
        grid-template-columns: 1fr;
      }

      .feature-card h1.long-title {
        font-size: 44px;
      }

      .feature-card h1.step-title {
        font-size: clamp(34px, 7vw, 44px);
      }
    }

    @media (max-width: 680px) {
      .simple-table,
      .simple-table thead,
      .simple-table tbody,
      .simple-table tr,
      .simple-table td {
        display: block;
      }

      .simple-table {
        border: 0;
        background: transparent;
      }

      .simple-table thead {
        display: none;
      }

      .simple-table tbody {
        display: grid;
        gap: 10px;
      }

      .simple-table tr {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel-2);
        padding: 10px 12px;
      }

      .simple-table td {
        padding: 9px 0;
        border-bottom: 1px solid var(--line);
      }

      .simple-table td::before {
        content: attr(data-label);
        display: block;
        margin-bottom: 4px;
        color: var(--blue);
        font-size: 10px;
        font-weight: 850;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
    }

    @media (max-width: 560px) {
      .deck,
      .workbench,
      .top-strip,
      .stage,
      .stage-hero,
      .stage-content,
      .content-column,
      .feature-card,
      .step-guide,
      .mini-card,
      .command-card,
      .check-item,
      .note-card {
        width: 100%;
        max-width: 100%;
        min-width: 0;
      }

      .deck {
        padding: 12px;
        overflow-x: hidden;
      }

      .top-strip {
        grid-template-columns: auto minmax(0, 1fr);
      }

      .stage-title span,
      .stage-title strong,
      .feature-card p,
      .feature-card h1,
      .mini-card strong,
      .check-item label,
      .note-card,

      .deck-button {
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .stage {
        padding: 14px;
        overflow-x: hidden;
      }

      .feature-card {
        min-height: auto;
      }

      .top-strip .deck-button.primary {
        grid-column: 1 / -1;
        justify-self: stretch;
      }

      .stage-footer {
        flex-direction: column;
      }

      .stage-footer .deck-button {
        width: 100%;
      }

      .feature-card h1.long-title {
        font-size: 32px;
        line-height: 1.05;
      }

      .feature-card h1.step-title {
        font-size: clamp(30px, 8vw, 38px);
        white-space: normal;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>

  <script>
    const oneCommandInstaller = String.raw`tmpfile=$(mktemp) && cat > "$tmpfile" <<'VPS_LLM_SETUP'
#!/usr/bin/env bash
set -Eeuo pipefail

say() {
  printf "\n==> %s\n" "$1"
}

ask_text() {
  prompt="$1"
  default="$2"
  answer=""
  read -rp "$prompt [$default]: " answer
  if [ -z "$answer" ]; then
    printf "%s" "$default"
  else
    printf "%s" "$answer"
  fi
}

restart_ssh() {
  sshd -t
  if systemctl list-unit-files | grep -q "^ssh.service"; then
    systemctl restart ssh
  else
    systemctl restart sshd
  fi
}

need_root_and_ubuntu() {
  if [ "$(id -u)" -ne 0 ]; then
    echo "Rode como root dentro da VPS Ubuntu."
    echo "Exemplo: ssh root@IP_DA_VPS"
    exit 1
  fi
  if [ ! -r /etc/os-release ] || ! grep -qi "ubuntu" /etc/os-release; then
    echo "Este comando foi feito para VPS Ubuntu limpa. Cancelei."
    exit 1
  fi
}

need_root_and_ubuntu
clear || true
echo "Instalador BAREMETAL COMPLETO para VPS limpa + Ollama + modelo LLM"
echo "Baremetal aqui significa VPS Ubuntu limpa/do zero, nao servidor fisico."
echo "O comando para para perguntar somente quando precisa e explica o que responder."
echo "Perguntas essenciais: usuario sudo, porta SSH, modelo, chave/senha se precisar e FECHAR22 no final."
echo "O restante sera configurado automaticamente com caminho seguro."

echo
echo "Pergunta 1/3: nome do usuario sudo para usar no dia a dia."
echo "Pode apertar Enter para aceitar llmadmin."
ADMIN_USER=$(ask_text "Usuario sudo da VPS" "llmadmin")
echo
echo "Pergunta 2/3: porta SSH segura."
echo "Pode apertar Enter para aceitar 2222."
SSH_PORT=$(ask_text "Porta SSH segura" "2222")
echo
echo "Pergunta 3/3: modelo Ollama para baixar."
echo "Para VPS pequena, aceite llama3.2:3b."
MODEL_NAME=$(ask_text "Modelo Ollama para baixar" "llama3.2:3b")

if ! printf "%s" "$ADMIN_USER" | grep -Eq "^[a-z_][a-z0-9_-]*[$]?$"; then
  echo "Usuario invalido. Use letras minusculas, numeros, _ ou -."
  exit 1
fi

if ! printf "%s" "$SSH_PORT" | grep -Eq "^[0-9]+$" || [ "$SSH_PORT" -lt 1024 ] || [ "$SSH_PORT" -gt 65535 ]; then
  echo "Porta invalida. Use numero entre 1024 e 65535, exemplo 2222."
  exit 1
fi

say "Atualizando Ubuntu e instalando base"
export DEBIAN_FRONTEND=noninteractive
apt update
apt upgrade -y
apt install -y curl ca-certificates git nano ufw fail2ban unattended-upgrades apt-listchanges htop jq lsb-release openssh-server auditd build-essential

say "Criando usuario sudo"
if id "$ADMIN_USER" >/dev/null 2>&1; then
  echo "Usuario $ADMIN_USER ja existe."
else
  adduser --disabled-password --gecos "" "$ADMIN_USER"
fi
usermod -aG sudo "$ADMIN_USER"
echo "$ADMIN_USER ALL=(ALL) NOPASSWD: ALL" > "/etc/sudoers.d/$ADMIN_USER"
chmod 440 "/etc/sudoers.d/$ADMIN_USER"

say "Preparando chave SSH do usuario"
mkdir -p "/home/$ADMIN_USER/.ssh"
KEY_READY="no"
if [ -s /root/.ssh/authorized_keys ]; then
  cp /root/.ssh/authorized_keys "/home/$ADMIN_USER/.ssh/authorized_keys"
  KEY_READY="yes"
  echo "Chave SSH do root copiada para $ADMIN_USER."
else
  echo "Nao encontrei chave SSH em /root/.ssh/authorized_keys."
  echo "Instrucao: cole sua chave publica SSH, a linha que comeca com ssh-ed25519 ou ssh-rsa."
  echo "No Windows, voce pode ver a chave com: type \$env:USERPROFILE\\.ssh\\id_ed25519.pub"
  echo "Se deixar vazio, vou pedir uma senha para $ADMIN_USER e manter login por senha temporariamente."
  SSH_PUBLIC_KEY=""
  read -rp "Chave publica SSH: " SSH_PUBLIC_KEY
  if [ -n "$SSH_PUBLIC_KEY" ]; then
    printf "%s\n" "$SSH_PUBLIC_KEY" > "/home/$ADMIN_USER/.ssh/authorized_keys"
    KEY_READY="yes"
  fi
fi

if [ "$KEY_READY" = "yes" ]; then
  PASSWORD_AUTH="no"
else
  PASSWORD_AUTH="yes"
  while true; do
    PASS1=""
    PASS2=""
    echo "Instrucao: a senha nao aparece enquanto voce digita; isso e normal."
    read -rsp "Digite uma senha para $ADMIN_USER: " PASS1
    echo
    read -rsp "Repita a senha: " PASS2
    echo
    if [ -n "$PASS1" ] && [ "$PASS1" = "$PASS2" ]; then
      echo "$ADMIN_USER:$PASS1" | chpasswd
      break
    fi
    echo "Senhas vazias ou diferentes. Tente de novo."
  done
fi

chown -R "$ADMIN_USER:$ADMIN_USER" "/home/$ADMIN_USER/.ssh"
chmod 700 "/home/$ADMIN_USER/.ssh"
if [ -f "/home/$ADMIN_USER/.ssh/authorized_keys" ]; then
  chmod 600 "/home/$ADMIN_USER/.ssh/authorized_keys"
fi

say "Configurando SSH seguro"
mkdir -p /etc/ssh/sshd_config.d
cat >/etc/ssh/sshd_config.d/99-llm-hardening.conf <<EOF
Port 22
Port $SSH_PORT
PermitRootLogin no
PasswordAuthentication $PASSWORD_AUTH
KbdInteractiveAuthentication no
PubkeyAuthentication yes
AllowUsers $ADMIN_USER
MaxAuthTries 3
MaxSessions 5
LoginGraceTime 30
ClientAliveInterval 300
ClientAliveCountMax 2
X11Forwarding no
AllowTcpForwarding local
AllowAgentForwarding no
PermitTunnel no
LogLevel VERBOSE
EOF
restart_ssh

say "Configurando firewall, fail2ban e atualizacao automatica"
ufw default deny incoming
ufw default allow outgoing
ufw allow 22/tcp
ufw allow "$SSH_PORT/tcp"
ufw --force enable
cat >/etc/fail2ban/jail.local <<EOF
[DEFAULT]
bantime = 1h
findtime = 10m
maxretry = 3

[sshd]
enabled = true
port = 22,$SSH_PORT
filter = sshd
logpath = /var/log/auth.log
maxretry = 3
bantime = 24h
EOF
systemctl enable --now fail2ban
systemctl restart fail2ban || true
cat >/etc/apt/apt.conf.d/20auto-upgrades <<'EOF'
APT::Periodic::Update-Package-Lists "1";
APT::Periodic::Unattended-Upgrade "1";
APT::Periodic::AutocleanInterval "7";
EOF
dpkg-reconfigure -f noninteractive unattended-upgrades || true
systemctl enable --now unattended-upgrades || true

say "Aplicando hardening de kernel e auditoria"
cat >/etc/sysctl.d/99-llm-hardening.conf <<'EOF'
kernel.randomize_va_space = 2
net.ipv4.tcp_syncookies = 1
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.icmp_echo_ignore_broadcasts = 1
net.ipv4.icmp_ignore_bogus_error_responses = 1
kernel.yama.ptrace_scope = 2
kernel.dmesg_restrict = 1
kernel.kptr_restrict = 2
fs.protected_hardlinks = 1
fs.protected_symlinks = 1
fs.suid_dumpable = 0
EOF
sysctl -p /etc/sysctl.d/99-llm-hardening.conf || true
cat >/etc/audit/rules.d/llm-hardening.rules <<'EOF'
-w /etc/passwd -p wa -k auth_changes
-w /etc/shadow -p wa -k auth_changes
-w /etc/group -p wa -k auth_changes
-w /etc/ssh/sshd_config -p wa -k ssh_changes
-w /etc/ssh/sshd_config.d/ -p wa -k ssh_changes
-w /etc/ufw/ -p wa -k firewall_changes
-w /etc/crontab -p wa -k cron_changes
-w /var/spool/cron/ -p wa -k cron_changes
-w /usr/bin/sudo -p x -k privilege_escalation
EOF
systemctl enable --now auditd || true

say "Criando swap automatico se a VPS precisar"
RAM_MB=$(awk '/MemTotal/ {print int($2/1024)}' /proc/meminfo)
SWAP_COUNT=$(swapon --show --noheadings | wc -l)
FREE_ROOT_GB=$(df -BG / | awk 'NR==2 {gsub("G","",$4); print $4}')
if [ "$RAM_MB" -lt 7500 ] && [ "$SWAP_COUNT" -eq 0 ] && [ "$FREE_ROOT_GB" -ge 10 ]; then
  fallocate -l 8G /swapfile || dd if=/dev/zero of=/swapfile bs=1G count=8 status=progress
  chmod 600 /swapfile
  mkswap /swapfile
  swapon /swapfile
  if ! grep -q "^/swapfile " /etc/fstab; then
    echo "/swapfile none swap sw 0 0" >> /etc/fstab
  fi
  echo "Swap de 8 GB criado."
else
  echo "Swap nao criado: RAM suficiente, swap existente ou pouco disco livre."
fi

say "Criando checklist automatico"

#!/usr/bin/env bash
set -u
MODEL_NAME="$MODEL_NAME"
ADMIN_USER="$ADMIN_USER"
SSH_PORT="$SSH_PORT"
pass() { printf "OK   %s\n" "\$1"; }
fail() { printf "ERRO %s\n" "\$1"; }
grep -qi ubuntu /etc/os-release && pass "Ubuntu detectado" || fail "Sistema nao parece Ubuntu"
id "\$ADMIN_USER" >/dev/null 2>&1 && pass "Usuario \$ADMIN_USER existe" || fail "Usuario \$ADMIN_USER nao existe"
test -f "/etc/sudoers.d/\$ADMIN_USER" && pass "sudo sem senha configurado para \$ADMIN_USER" || fail "sudoers do usuario ausente"
test -s "/home/\$ADMIN_USER/.ssh/authorized_keys" && pass "Chave SSH do usuario configurada" || fail "Chave SSH do usuario ausente"
sshd -t >/dev/null 2>&1 && pass "Configuracao SSH valida" || fail "sshd -t falhou"
grep -q "PermitRootLogin no" /etc/ssh/sshd_config.d/99-llm-hardening.conf && pass "Root SSH bloqueado" || fail "Root SSH nao bloqueado"
grep -q "Port \$SSH_PORT" /etc/ssh/sshd_config.d/99-llm-hardening.conf && pass "Porta SSH \$SSH_PORT configurada" || fail "Porta SSH nao encontrada"
grep -q "AllowTcpForwarding local" /etc/ssh/sshd_config.d/99-llm-hardening.conf && pass "Tunel SSH local permitido" || fail "Tunel SSH local nao configurado"
ufw status | grep -q "Status: active" && pass "UFW ativo" || fail "UFW nao ativo"
if ufw status | grep -q "11434"; then fail "Porta 11434 apareceu no UFW"; else pass "Ollama 11434 nao esta publico no UFW"; fi
systemctl is-active --quiet fail2ban && pass "fail2ban ativo" || fail "fail2ban inativo"
systemctl is-active --quiet auditd && pass "auditd ativo" || fail "auditd inativo"
systemctl is-active --quiet unattended-upgrades && pass "unattended-upgrades ativo" || fail "unattended-upgrades inativo"
systemctl is-enabled --quiet vps-llm-stack-update.timer && pass "timer semanal LLM ativo" || fail "timer semanal LLM nao ativo"
command -v ollama >/dev/null 2>&1 && pass "Ollama instalado" || fail "Ollama nao instalado"
systemctl is-active --quiet ollama && pass "Servico ollama ativo" || fail "Servico ollama inativo"
curl -fsS http://localhost:11434/api/tags >/dev/null 2>&1 && pass "API local Ollama responde" || fail "API local Ollama nao responde"
ollama list | awk '{print \$1}' | grep -qx "\$MODEL_NAME" && pass "Modelo \$MODEL_NAME baixado" || fail "Modelo \$MODEL_NAME nao aparece no ollama list"
[ -x /usr/local/sbin/vps-llm-update ] && pass "vps-llm-update criado" || fail "vps-llm-update ausente"
echo
echo "Se todos os itens principais estao OK, a VPS esta pronta."
EOF

    const stateKey = "vps-llm-command-deck:v1";
    const themeKey = "vps-llm-command-deck-theme:v1";
    const stageKey = "vps-llm-command-deck-stage:v1";
    const saved = JSON.parse(localStorage.getItem(stateKey) || "{}");
    let currentIndex = Math.max(0, stages.findIndex((stage) => stage.id === localStorage.getItem(stageKey)));
    if (currentIndex < 0) currentIndex = 0;
    let showingGlossary = false;

    const stageList = document.getElementById("stageList");
    const stagePanel = document.getElementById("stagePanel");
    const progressOrb = document.getElementById("progressOrb");
    const progressValue = document.getElementById("progressValue");

    const topSummary = document.getElementById("topSummary");

    const asideSummary = document.getElementById("asideSummary");

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function checkId(stage, index, prefix = "check") {
      return `${stage.id}-${prefix}-${index}`;
    }

    function providerChoiceId(stage) {
      return `${stage.id}-provider-choice`;
    }

    function stageCompleteId(stage) {
      return `${stage.id}-stage-complete`;
    }

    function selectedProviderIndex(stage) {
      if (!stage.providers || !stage.providers.length) return -1;
      const choice = Number(saved[providerChoiceId(stage)] ?? 0);
      return Number.isInteger(choice) && choice >= 0 && choice < stage.providers.length ? choice : 0;
    }

    function allCheckIds() {
      const ids = [];
      stages.forEach((stage) => ids.push(...stageCheckIds(stage)));
      return ids;
    }

    function stageCheckIds(stage) {
      const ids = [];
      (stage.checks || []).forEach((_, index) => ids.push(checkId(stage, index)));
      if (stage.providers && stage.providers.length) {
        const providerIndex = selectedProviderIndex(stage);
        const provider = stage.providers[providerIndex];
        (provider.checks || []).forEach((_, index) => ids.push(checkId(stage, `${providerIndex}-${index}`, "provider")));
      }
      return ids;
    }

    function stageIsDone(stage) {
      const ids = stageCheckIds(stage);
      if (ids.length) return ids.every((id) => saved[id]);
      return Boolean(saved[stageCompleteId(stage)]);
    }

    function markReferenceStageDone(stage) {
      if (stageCheckIds(stage).length) return;
      saved[stageCompleteId(stage)] = true;
      localStorage.setItem(stateKey, JSON.stringify(saved));
    }

    function sortedGlossaryTerms() {
      return [...glossaryTerms].sort((a, b) => a[0].localeCompare(b[0], "pt-BR", { sensitivity: "base" }));
    }

    function glossaryLetter(term) {
      const first = term.normalize("NFD").replace(/[\u0300-\u036f]/g, "").charAt(0).toUpperCase();
      return /^[A-Z]$/.test(first) ? first : "#";
    }

    function glossaryGroups() {
      return sortedGlossaryTerms().reduce((groups, item) => {
        const letter = glossaryLetter(item[0]);
        groups[letter] = groups[letter] || [];
        groups[letter].push(item);
        return groups;
      }, {});
    }

    function renderGlossaryStage() {
      const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
      const groups = glossaryGroups();
      const letterIndex = alphabet
        .map((letter) => groups[letter]
          ? `<a class="letter-link" href="#letter-${letter}">${letter}</a>`
          : `<span class="letter-link disabled">${letter}</span>`)
        .join("");
      const sections = alphabet
        .filter((letter) => groups[letter])
        .map((letter) => `
          <section class="glossary-section" id="letter-${letter}">
            <div class="letter-heading">${letter}</div>
            <div class="glossary-grid">
              ${groups[letter].map(([term, description]) => `
                <article class="glossary-card">
                  <strong>${escapeHtml(term)}</strong>
                  <p>${escapeHtml(description)}</p>
                </article>
              `).join("")}
            </div>
          </section>
        `)
        .join("");

      topTitle.textContent = "Glossario tecnico A-Z";
      topSummary.textContent = `${glossaryTerms.length} termos tecnicos explicados em uma frase.`;

      stagePanel.innerHTML = `
        <div class="glossary-stage">
          <div class="glossary-hero">
            <div class="kicker">Glossario tecnico</div>
            <h1>Indice A-Z</h1>
            <p>Termos da instalacao explicados de forma direta, sem depender de outro termo tecnico para entender.</p>
            <button class="deck-button" id="backToGuide" type="button">Voltar ao passo atual</button>
          </div>
          <div class="letter-index" aria-label="Indice alfabetico">${letterIndex}</div>
          <div class="glossary-sections">${sections}</div>
          <div class="stage-footer">
            <button class="deck-button" id="backToGuideFooter" type="button">Voltar ao guia</button>
            <button class="deck-button primary" id="nextFromGlossary" type="button">Avancar</button>
          </div>
        </div>
      `;

      ["backToGuide", "backToGuideFooter"].forEach((id) => {
        document.getElementById(id).addEventListener("click", () => {
          showingGlossary = false;
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
      });
      document.getElementById("nextFromGlossary").addEventListener("click", () => moveStage(1));
    }

    function renderRail() {
      const query = stageSearch.value.trim().toLowerCase();
      glossaryToggle.classList.toggle("active", showingGlossary);
      glossaryToggle.setAttribute("aria-pressed", String(showingGlossary));
      glossaryToggle.querySelector("span").textContent = showingGlossary ? "Fechar" : "Abrir";
      const visibleStages = stages
        .map((stage, index) => ({ stage, index }))
        .filter(({ stage }) => !query || `${stage.phase || ""} ${stage.title} ${stage.summary} ${stage.kicker}`.toLowerCase().includes(query));
      let lastPhase = "";
      stageList.innerHTML = visibleStages
        .map(({ stage, index }) => {
          const done = stageIsDone(stage);
          const active = !showingGlossary && index === currentIndex;
          const phase = stage.phase || "GUIA";
          const phaseHeader = phase !== lastPhase ? `<div class="stage-phase-label">${escapeHtml(phase)}</div>` : "";
          lastPhase = phase;
          return `${phaseHeader}<button class="stage-button ${active ? "active" : ""} ${done ? "done" : ""}" type="button" data-stage="${index}">
            <span class="stage-no">${escapeHtml(stage.no)}</span>
            <span><strong>${escapeHtml(stage.title)}</strong><small>${escapeHtml(stage.kicker)}</small></span>
            <span class="stage-dot" aria-hidden="true"></span>
          </button>`;
        })
        .join("");

      stageList.querySelectorAll("[data-stage]").forEach((button) => {
        button.addEventListener("click", () => {
          currentIndex = Number(button.dataset.stage);
          showingGlossary = false;
          document.body.classList.remove("nav-open");
          render();
        });
      });

      const activeStageButton = stageList.querySelector(".stage-button.active");
      if (activeStageButton) {
        requestAnimationFrame(() => {
          activeStageButton.scrollIntoView({ block: "nearest", inline: "nearest" });
        });
      }
    }

    function commandText(code) {
      return String(code || "").replace(/(^|[^\\])\\n/g, (_, prefix) => `${prefix}\n`);
    }

    function commandTip(command) {
      const code = commandText(command.code || "");
      const label = command.label || "Comando";
      const lower = code.toLowerCase();

      if (command.tip) return command.tip;
      if (lower.includes("ssh -l") || lower.startsWith("ssh ") || lower.includes("ssh -p")) {
        return "Rode no PowerShell do Windows local quando o comando for de conexao ou tunel SSH.";
      }
      if (lower.includes("ufw ") || lower.includes("sshd -t") || lower.includes("fail2ban") || lower.includes("unattended-upgrades")) {
        return "Rode dentro da VPS Ubuntu. Confira o passo antes de alterar SSH ou firewall.";
      }
      if (lower.includes("ollama") || lower.includes("localhost:11434")) {
        return "Rode dentro da VPS, exceto quando a etapa disser para testar pelo Windows usando tunel SSH.";
      }
      if (lower.includes("docker") || lower.includes("open-webui")) {
        return "Rode dentro da VPS. Por padrao, a Web UI fica em localhost e deve ser acessada por tunel.";
      }
      return `Antes de colar "${label}", confira se o comando e do PowerShell local ou do terminal SSH da VPS.`;
    }

    function commandHtml(command) {
      const tip = commandTip(command);
      return `<div class="command-card">
        <div class="command-head">
          <span class="command-title">
            <span>${escapeHtml(command.label)}</span>
            <span class="command-help" tabindex="0" aria-label="${escapeHtml(tip)}" data-tip="${escapeHtml(tip)}"><svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"></circle><path d="M12 11v5"></path><path d="M12 8h.01"></path></svg></span>
          </span>
          <button class="copy-button" type="button">Copiar</button>
        </div>
        <pre><code>${escapeHtml(commandText(command.code))}</code></pre>
      </div>`;
    }

    function commandEnvironment(command) {
      const tip = commandTip(command);
      const lower = tip.toLowerCase();
      if (lower.includes("powershell") || lower.includes("windows local")) return "PowerShell local";
      if (lower.includes("tunel")) return "PowerShell local + VPS";
      if (lower.includes("vps")) return "Terminal SSH da VPS";
      if (lower.includes("navegador")) return "Navegador";
      return "Conferir ambiente";
    }

    function expectedCommandResult(command) {
      const code = commandText(command.code || "").toLowerCase();
      const label = String(command.label || "").toLowerCase();
      if (code.includes("tmpfile=$(mktemp)")) return "O instalador pergunta somente o necessario, instala seguranca, Ollama, modelo e scripts de update/check.";
      if (code.includes("ssh-keygen")) return "O Windows cria uma chave SSH em C:\\Users\\SeuNome\\.ssh sem mostrar erro.";
      if (code.includes("id_ed25519.pub") || code.includes("authorized_keys")) return "A chave publica aparece na tela ou fica instalada no usuario correto.";
      if (code.startsWith("ssh ") || code.includes("\nssh ")) return "O terminal entra na VPS ou abre um tunel e fica aguardando enquanto a conexao estiver ativa.";
      if (code.includes("vps-llm-check")) return "O checklist automatico mostra OK nos itens principais ou indica exatamente o que corrigir.";
      if (code.includes("vps-llm-update")) return "Ubuntu, Ollama e checagens do stack rodam sem erro.";
      if (code.includes("ufw status") || code.includes("ufw allow") || code.includes("ufw delete")) return "O UFW mostra somente as portas esperadas, sem abrir 11434 publicamente.";
      if (code.includes("sshd -t")) return "O comando nao imprime erro; se imprimir, pare e corrija antes de reiniciar SSH.";
      if (code.includes("fail2ban")) return "O fail2ban aparece ativo ou mostra status sem quebrar o restante do passo.";
      if (code.includes("unattended-upgrades") || code.includes("list-timers")) return "Atualizacoes automaticas aparecem ativas no systemd.";
      if (code.includes("ollama pull")) return "O modelo baixa ate 100% e fica listado em ollama list.";
      if (code.includes("ollama run")) return "O modelo responde no terminal; use Ctrl+C para sair se ficar em modo conversa.";
      if (code.includes("ollama.com/install.sh")) return "Ollama instala ou atualiza, o servico reinicia e ollama -v responde.";
      if (code.includes("localhost:11434") || code.includes("/api/generate") || code.includes("/v1/chat/completions")) return "A resposta vem em JSON ou texto do modelo, usando localhost e nao IP publico.";
      if (code.includes("docker run")) return "O Docker retorna um ID de container e o Open WebUI fica preso em 127.0.0.1:3000.";
      if (code.includes("docker ps") || code.includes("docker logs")) return "O container aparece em execucao e os logs nao mostram erro critico.";
      if (code.includes("apt update") || code.includes("apt install") || code.includes("apt upgrade")) return "O apt termina sem erro e volta para o prompt.";
      if (code.includes("free -h") || code.includes("df -h") || code.includes("nproc")) return "Voce ve RAM, disco, CPU e pode decidir se o modelo cabe na VPS.";
      if (label.includes("status") || label.includes("logs")) return "Os servicos e logs aparecem para diagnosticar sem reinstalar tudo.";
      return "O comando termina sem erro e volta para o prompt certo antes de voce avancar.";
    }

    function stageEnvironment(stage) {
      const phase = stage.phase || "";
      if (phase === "PREPARACAO") return "Navegador + painel da VPS";
      if (phase === "ACESSO SSH") return "PowerShell local";
      if (phase === "BAREMETAL COMPLETO") return "Root na VPS";
      if (phase === "SEGURANCA") return "VPS + segundo PowerShell";
      if (phase === "LLM LOCAL") return "Terminal SSH da VPS";
      if (phase === "WEB UI") return "VPS + tunel SSH";
      if (phase === "OPERACAO") return "Rotina na VPS";
      if (phase === "AJUDA") return "Diagnostico";
      if (phase === "CHECKLIST") return "Revisao final";
      return "Leitura";
    }

    function miniListHtml(items) {
      if (!items || !items.length) return "";
      return `<ul class="substep-mini-list">${items.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`;
    }

    function substepHtml(step) {
      const chips = [step.env, step.kind].filter(Boolean).map((chip) => `<span class="substep-chip">${escapeHtml(chip)}</span>`).join("");
      return `<li class="substep">
        <div class="substep-body">
          <div class="substep-title">${escapeHtml(step.title)}</div>
          ${chips ? `<div class="substep-meta">${chips}</div>` : ""}
          <p>${escapeHtml(step.body)}</p>
          ${step.result ? `<p class="substep-result"><strong>Resultado esperado:</strong> ${escapeHtml(step.result)}</p>` : ""}
          ${miniListHtml(step.items)}
        </div>
      </li>`;
    }

    function stageGuideSteps(stage) {
      const steps = [];
      const commands = stage.commands || [];
      const links = stage.links || [];
      const checks = stage.checks || [];
      const notes = stage.notes || [];
      const tables = [stage.table, ...(stage.tables || [])].filter(Boolean);

      steps.push({
        title: `Entenda a etapa ${stage.no}`,
        env: "Leitura",
        kind: stageEnvironment(stage),
        body: `${stage.summary} Foco: ${stage.highlight}`,
        result: "Voce sabe qual janela usar e qual resultado precisa ver antes de avancar."
      });

      links.forEach((link, index) => {
        steps.push({
          title: `Abrir link ${index + 1}: ${link.label}`,
          env: "Navegador",
          kind: "Referencia",
          body: link.body || "Abra o link recomendado e volte para este guia depois de conferir.",
          result: "Voce confirmou a informacao no site certo antes de executar comandos."
        });
      });

      tables.forEach((table, index) => {
        steps.push({
          title: `Ler tabela de referencia ${index + 1}`,
          env: "Neste guia",
          kind: "Conferencia",
          body: `Use a tabela com as colunas ${table.head.join(", ")} para decidir o caminho correto.`,
          result: "Voce entende o que preencher, qual ambiente usar e o que esperar."
        });
      });

      if (stage.providers && stage.providers.length) {
        steps.push({
          title: "Escolher o caminho desta etapa",
          env: "Neste guia",
          kind: "Decisao",
          body: "Clique em Usar este caminho no card correto. O deck conta somente os checkpoints do caminho selecionado.",
          result: "A etapa mostra apenas os comandos e checkpoints do caminho escolhido."
        });
      }

      commands.forEach((command, index) => {
        steps.push({
          title: `Executar comando ${index + 1}: ${command.label}`,
          env: commandEnvironment(command),
          kind: "Comando",
          body: `${commandTip(command)} Clique em Copiar. Se o botao mostrar Ctrl+C, o comando ficou selecionado: aperte Ctrl+C manualmente e cole no terminal correto.`,
          result: expectedCommandResult(command)
        });
      });

      if (notes.length) {
        steps.push({
          title: "Ler avisos antes de avancar",
          env: "Neste guia",
          kind: "Cuidado",
          body: "Leia os avisos amarelos da etapa. Eles explicam riscos, atalhos seguros e quando nao seguir em frente.",
          result: "Voce evita expor portas, fechar SSH cedo demais ou baixar modelo pesado demais.",
          items: notes
        });
      }

      if (checks.length) {
        steps.push({
          title: "Marcar checkpoints da etapa",
          env: "Neste guia",
          kind: "Progresso",
          body: "Marque cada checkpoint somente depois de ver o resultado no navegador, no painel da VPS ou no terminal correto.",
          result: "O progresso fica salvo neste navegador e a proxima etapa fica mais clara.",
          items: checks
        });
      } else {
        steps.push({
          title: "Avancar com consciencia",
          env: "Neste guia",
          kind: "Progresso",
          body: "Esta etapa e de consulta. Leia o conteudo e clique em Avancar quando fizer sentido.",
          result: "O deck registra a etapa de referencia como concluida ao avancar."
        });
      }

      return steps;
    }

    function stageGuideHtml(stage) {
      const steps = stageGuideSteps(stage);
      return `<section class="step-guide" aria-label="Passo a passo detalhado">
        <div class="step-guide-head">
          <div class="kicker">Passo a passo detalhado</div>
          <strong>Siga estes subpassos em ordem</strong>
          <p>Feito para iniciante: leia a acao, confira o ambiente e so marque o checklist depois do resultado esperado.</p>
        </div>
        <ol class="substep-list">${steps.map(substepHtml).join("")}</ol>
      </section>`;
    }

    function checkHtml(id, label) {
      return `<div class="check-item">
        <input id="${escapeHtml(id)}" type="checkbox" ${saved[id] ? "checked" : ""} />
        <label for="${escapeHtml(id)}">${escapeHtml(label)}</label>
      </div>`;
    }

    function tableCellValue(cell) {
      return typeof cell === "object" && cell !== null ? cell.text : cell;
    }

    function tableCellTip(cell) {
      return typeof cell === "object" && cell !== null ? cell.tip : "";
    }

    function tableCellUrl(cell) {
      return typeof cell === "object" && cell !== null ? cell.url : "";
    }

    function tableCellHtml(cell, label, cellIndex, totalCells) {
      const value = tableCellValue(cell);
      const tip = tableCellTip(cell);
      const url = tableCellUrl(cell);
      const edgeClass = cellIndex === totalCells - 1 ? " tip-left" : "";
      const help = tip ? `<span class="cell-help${edgeClass}" tabindex="0" aria-label="${escapeHtml(tip)}" data-tip="${escapeHtml(tip)}"><svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"></circle><path d="M12 11v5"></path><path d="M12 8h.01"></path></svg></span>` : "";
      const content = url
        ? `<a class="table-link" href="${escapeHtml(url)}" target="_self" rel="noopener noreferrer"><code>${escapeHtml(value)}</code></a>`
        : `<code>${escapeHtml(value)}</code>`;
      return `<td data-label="${escapeHtml(label || "")}"><span class="table-cell">${content}${help}</span></td>`;
    }

    function tableHtml(table) {
      if (!table) return "";
      return `<table class="simple-table">
        <thead><tr>${table.head.map((head) => `<th>${escapeHtml(head)}</th>`).join("")}</tr></thead>
        <tbody>${table.rows.map((row) => `<tr>${row.map((cell, cellIndex) => tableCellHtml(cell, table.head[cellIndex], cellIndex, row.length)).join("")}</tr>`).join("")}</tbody>
      </table>`;
    }

    function linksHtml(stage) {
      if (!stage.links) return "";
      return stage.links.map((link) => `
        <a class="link-card" href="${escapeHtml(link.url)}" target="_self" rel="noopener noreferrer" aria-label="Abrir ${escapeHtml(link.label)}">
          <div class="card-kicker">Link recomendado</div>
          <div class="link-title">
            <strong>${escapeHtml(link.label)}</strong>
            <span class="link-cta" aria-hidden="true">ABRIR LINK</span>
          </div>
          <span class="link-body">${escapeHtml(link.body || link.url)}</span>
        </a>
      `).join("");
    }

    function tablesHtml(stage) {
      return [stage.table, ...(stage.tables || [])].map(tableHtml).join("");
    }

    function providersHtml(stage) {
      if (!stage.providers) return "";
      const activeProviderIndex = selectedProviderIndex(stage);
      return `<div class="provider-grid">${stage.providers.map((provider, providerIndex) => {
        const active = providerIndex === activeProviderIndex;
        const providerChecks = (provider.checks || []).map((check, index) => checkHtml(checkId(stage, `${providerIndex}-${index}`, "provider"), check)).join("");
        const extraCommands = active ? (provider.extraCommands || []).map(commandHtml).join("") : "";
        return `
        <article class="provider-card ${active ? "active" : ""}">
          <div class="card-kicker">Caminho ${providerIndex + 1}</div>
          <strong>${escapeHtml(provider.title)}</strong>
          <p>${escapeHtml(provider.body)}</p>
          <button class="deck-button provider-choice ${active ? "active" : ""}" type="button" data-provider-choice="${providerIndex}">
            ${active ? "Caminho selecionado" : "Usar este caminho"}
          </button>
          ${commandHtml({ label: provider.title, code: provider.code })}
          ${extraCommands}
          ${active ? `<div class="check-grid">${providerChecks}</div>` : `<div class="provider-hint">Escolha este caminho para mostrar e contar somente os checkpoints dele.</div>`}
        </article>
      `; }).join("")}</div>`;
    }

    function agentFallbackHtml(stage) {
      const fallback = stage.agentFallback;
      if (!fallback) return "";
      const notes = (fallback.notes || []).map((note) => `<div class="note-card">${escapeHtml(note)}</div>`).join("");
      const commands = (fallback.commands || []).map(commandHtml).join("");
      return `
        <section class="fallback-panel">
          <div class="fallback-head">
            <div class="kicker">${escapeHtml(fallback.kicker || "Sugestao")}</div>
            <strong>${escapeHtml(fallback.title)}</strong>
            <p>${escapeHtml(fallback.body)}</p>
          </div>
          ${notes ? `<div class="fallback-grid">${notes}</div>` : ""}
          ${commands ? `<div class="fallback-grid">${commands}</div>` : ""}
          ${fallback.table ? tableHtml(fallback.table) : ""}
        </section>
      `;
    }

    function renderStage() {
      const stage = stages[currentIndex];
      topTitle.textContent = stage.title;
      topSummary.textContent = stage.summary;
      asideTitle.textContent = `${stage.no} - ${stage.title}`;
      asideSummary.textContent = stage.highlight;
      localStorage.setItem(stageKey, stage.id);

      const commands = (stage.commands || []).map(commandHtml).join("");
      const leftNotes = (stage.leftNotes || []).map((note) => `<div class="note-card">${escapeHtml(note)}</div>`).join("");
      const checks = (stage.checks || []).map((check, index) => checkHtml(checkId(stage, index), check)).join("");
      const notes = (stage.notes || []).map((note) => `<div class="note-card">${escapeHtml(note)}</div>`).join("");
      const checkCount = stageCheckIds(stage).length;
      const doneCount = stageCheckIds(stage).filter((id) => saved[id]).length;
      const referenceDone = !checkCount && Boolean(saved[stageCompleteId(stage)]);
      const checkpointLabel = checkCount ? `${doneCount}/${checkCount}` : "Consulta";
      const statusLabel = checkCount ? (doneCount === checkCount ? "Completo" : "Em andamento") : (referenceDone ? "Concluido" : "Consulta");
      const titleClass = stage.id === "uso" ? "step-title" : (stage.title.length > 38 ? "long-title" : "");

      stagePanel.innerHTML = `
        <div class="stage-hero">
          <div class="feature-card">
            <div class="kicker">${escapeHtml(stage.kicker)}</div>
            <h1 class="${titleClass}">${escapeHtml(stage.title)}</h1>
            <p>${escapeHtml(stage.summary)}</p>
          </div>
          <div class="stage-meta">
            <div class="mini-card"><div class="mini-label">Etapa</div><strong>${escapeHtml(stage.no)}</strong></div>
            <div class="mini-card"><div class="mini-label">Checkpoints</div><strong>${checkpointLabel}</strong></div>
            <div class="mini-card"><div class="mini-label">Foco</div><strong>${escapeHtml(stage.highlight)}</strong></div>
            <div class="mini-card"><div class="mini-label">Status</div><strong>${statusLabel}</strong></div>
          </div>
        </div>
        <div class="stage-content ${stage.providers ? "provider-stage-content" : ""}">
          <div class="content-column">
            ${stageGuideHtml(stage)}
            ${linksHtml(stage)}
            ${providersHtml(stage)}
            ${commands}
            ${leftNotes}
            ${tablesHtml(stage)}
          </div>
          <div class="content-column">
            ${checks ? `<div class="check-grid">${checks}</div>` : `<div class="note-card">Esta etapa e de consulta. Use os comandos quando precisar.</div>`}
            ${notes}
          </div>
        </div>
        ${agentFallbackHtml(stage)}
        <div class="stage-footer">
          <button class="deck-button" id="prevStage" type="button">Voltar</button>
          <button class="deck-button primary" id="nextStage" type="button">Avancar</button>
        </div>
      `;

      stagePanel.querySelectorAll('input[type="checkbox"]').forEach((input) => {
        input.addEventListener("change", () => {
          saved[input.id] = input.checked;
          localStorage.setItem(stateKey, JSON.stringify(saved));
          render();
        });
      });

      stagePanel.querySelectorAll("[data-provider-choice]").forEach((button) => {
        button.addEventListener("click", () => {
          saved[providerChoiceId(stage)] = Number(button.dataset.providerChoice);
          localStorage.setItem(stateKey, JSON.stringify(saved));
          render();
        });
      });

      stagePanel.querySelectorAll(".copy-button").forEach((button) => {
        button.addEventListener("click", async () => {
          const codeNode = button.closest(".command-card").querySelector("code");
          const result = await copyText(codeNode.innerText, codeNode);
          button.textContent = result.copied ? "Copiado" : "Ctrl+C";
          showToast(result.message);
          setTimeout(() => (button.textContent = "Copiar"), result.copied ? 1400 : 2600);
        });
      });

      document.getElementById("prevStage").addEventListener("click", () => moveStage(-1));
      document.getElementById("nextStage").addEventListener("click", () => moveStage(1));
    }

    function renderAside() {
      phaseGrid.innerHTML = stages.map((stage) => {
        const ids = stageCheckIds(stage);
        const done = stageIsDone(stage);
        return `<div class="phase-cell ${done ? "done" : ""} ${ids.length ? "" : "reference"}">${stage.no}</div>`;
      }).join("");

      if (showingGlossary) {
        asideTitle.textContent = "Glossario tecnico A-Z";
        asideSummary.textContent = `${glossaryTerms.length} termos em linguagem direta.`;
        contextList.innerHTML = [
          `<div class="context-item"><strong>Como usar</strong><p>Clique em uma letra do indice e leia somente o termo que travou o passo.</p></div>`,
          `<div class="context-item"><strong>Regra</strong><p>Cada explicacao tem uma frase para consulta rapida durante a instalacao.</p></div>`
        ].join("");
        return;
      }

      const stage = stages[currentIndex];
      const commands = (stage.commands || []).slice(0, 4);
      const phaseHelp = stage.phase === "SUBIR VPS"
        ? "Voce esta preparando a VPS: alguns comandos rodam no PowerShell local e outros no SSH da VPS."
        : stage.phase === "HARDENING"
          ? "Voce esta alterando SSH/firewall: mantenha uma sessao aberta e teste antes de fechar portas."
          : stage.phase === "LLM LOCAL"
            ? "Voce esta instalando LLM local: rode comandos dentro da VPS como llmadmin."
            : "Siga os blocos em ordem: VPS limpa, SSH, 1 comando, LLM local e validacao.";
      contextList.innerHTML = [
        `<div class="context-item"><strong>Bloco atual</strong><p>${escapeHtml(phaseHelp)}</p></div>`,
        `<div class="context-item"><strong>Trocas antes de colar</strong><p>IP_DA_VPS = IP publico; EMAIL = seu email; CHAVE_PUBLICA_SSH = linha ssh-ed25519; llmadmin = usuario dedicado.</p></div>`,
        `<div class="context-item"><strong>Regra de seguranca</strong><p>Nao abra 11434 publicamente; teste 2222 antes de fechar 22.</p></div>`,
        ...commands.map((command) => `<div class="context-item"><strong>${escapeHtml(command.label)}</strong><p>${escapeHtml(commandText(command.code).split("\n")[0])}</p></div>`)
      ].join("");
    }

    function renderProgress() {
      const ids = allCheckIds();
      const done = ids.filter((id) => saved[id]).length;
      const total = ids.length;
      const percent = total ? Math.round((done / total) * 100) : 0;
      progressValue.textContent = `${percent}%`;
      progressSummary.textContent = `${done} de ${total}`;
      progressOrb.style.background = `conic-gradient(var(--green) ${percent * 3.6}deg, var(--line) 0deg)`;
    }

    function render() {
      renderRail();
      if (showingGlossary) {
        renderGlossaryStage();
      } else {
        renderStage();
      }
      renderAside();
      renderProgress();
    }

    function moveStage(direction) {
      const wasGlossary = showingGlossary;
      if (!wasGlossary && direction > 0) {
        markReferenceStageDone(stages[currentIndex]);
      }
      showingGlossary = false;
      currentIndex = (currentIndex + direction + stages.length) % stages.length;
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1400);
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function showFloatingTip(trigger) {
      const message = trigger?.dataset?.tip;
      if (!message) return;
      floatingTip.textContent = message;
      floatingTip.setAttribute("aria-hidden", "false");
      floatingTip.classList.add("show");

      const rect = trigger.getBoundingClientRect();
      const margin = 12;
      const maxWidth = Math.min(320, window.innerWidth - margin * 2);
      floatingTip.style.width = `${maxWidth}px`;
      floatingTip.style.left = "0px";
      floatingTip.style.top = "0px";

      const tipRect = floatingTip.getBoundingClientRect();
      const left = clamp(rect.left, margin, window.innerWidth - tipRect.width - margin);
      let top = rect.bottom + 8;
      if (top + tipRect.height > window.innerHeight - margin) {
        top = rect.top - tipRect.height - 8;
      }
      floatingTip.style.left = `${left}px`;
      floatingTip.style.top = `${Math.max(margin, top)}px`;
    }

    function hideFloatingTip() {
      floatingTip.classList.remove("show");
      floatingTip.setAttribute("aria-hidden", "true");
    }

    function selectElementText(element) {
      if (!element) return;
      const range = document.createRange();
      range.selectNodeContents(element);
      const selection = window.getSelection();
      selection.removeAllRanges();
      selection.addRange(range);
    }

    async function copyText(text, sourceNode) {
      let clipboardAttempted = false;
      if (navigator.clipboard && window.isSecureContext) {
        try {
          await navigator.clipboard.writeText(text);
          clipboardAttempted = true;
        } catch {
          // Alguns navegadores bloqueiam clipboard; use a selecao visivel abaixo.
        }
      }
      selectElementText(sourceNode);
      return {
        copied: false,
        message: clipboardAttempted
          ? "Comando selecionado. Confira o clipboard ou aperte Ctrl+C."
          : "Comando selecionado. Aperte Ctrl+C."
      };
    }

    const themeIcons = {
      sun: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path></svg>',
      moon: '<svg viewBox="0 0 24 24"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.5 6.5 0 0 0 9.8 9.8Z"></path></svg>'
    };

    function setThemeButton(button, icon, label) {
      button.innerHTML = `<span class="theme-icon" aria-hidden="true">${themeIcons[icon]}</span>`;
      button.setAttribute("aria-label", label);
      button.setAttribute("title", label);
    }

    function applyTheme(theme) {
      document.documentElement.dataset.theme = theme;
      const label = theme === "dark" ? "Alternar para tema claro" : "Alternar para tema escuro";
      const icon = theme === "dark" ? "sun" : "moon";
      setThemeButton(document.getElementById("themeToggle"), icon, label);
      setThemeButton(document.getElementById("themeToggleTop"), icon, label);
      localStorage.setItem(themeKey, theme);
    }

    function toggleTheme() {
      applyTheme(document.documentElement.dataset.theme === "dark" ? "light" : "dark");
      showToast(document.documentElement.dataset.theme === "dark" ? "Tema escuro ativo" : "Tema claro ativo");
    }

    document.getElementById("themeToggle").addEventListener("click", toggleTheme);
    document.getElementById("themeToggleTop").addEventListener("click", toggleTheme);
    document.getElementById("nextTop").addEventListener("click", () => moveStage(1));
    document.getElementById("menuButton").addEventListener("click", () => document.body.classList.toggle("nav-open"));
    document.getElementById("resetProgress").addEventListener("click", () => {
      if (!confirm("Limpar todos os checkpoints marcados neste navegador?")) return;
      Object.keys(saved).forEach((key) => delete saved[key]);
      localStorage.setItem(stateKey, JSON.stringify(saved));
      render();
      showToast("Progresso limpo");
    });
    stageSearch.addEventListener("input", renderRail);
    glossaryToggle.addEventListener("click", () => {
      showingGlossary = !showingGlossary;
      document.body.classList.remove("nav-open");
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
      showToast(showingGlossary ? "Glossario aberto" : "Voltou ao guia");
    });

    document.addEventListener("mouseover", (event) => {
      const trigger = event.target.closest("[data-tip]");
      if (!trigger) return;
      showFloatingTip(trigger);
    });

    document.addEventListener("mouseout", (event) => {
      const trigger = event.target.closest("[data-tip]");
      if (!trigger) return;
      if (event.relatedTarget && trigger.contains(event.relatedTarget)) return;
      hideFloatingTip();
    });

    document.addEventListener("focusin", (event) => {
      const trigger = event.target.closest("[data-tip]");
      if (trigger) showFloatingTip(trigger);
    });

    document.addEventListener("focusout", (event) => {
      if (event.target.closest("[data-tip]")) hideFloatingTip();
    });

    window.addEventListener("scroll", hideFloatingTip, true);
    window.addEventListener("resize", hideFloatingTip);

    window.addEventListener("keydown", (event) => {
      if (event.target.matches("input, textarea")) return;
      hideFloatingTip();
      if (event.key.toLowerCase() === "j") moveStage(1);
      if (event.key.toLowerCase() === "k") moveStage(-1);
    });

    applyTheme(localStorage.getItem(themeKey) || "dark");
    render();
  </script>
</body>
</html>
